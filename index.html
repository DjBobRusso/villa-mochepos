function generateShoppingList(){
DB.shoppingList=[];var sug={};
DB.inventory.forEach(function(inv){
if(inv.stock<=inv.alertMin){
var buy=inv.alertMin*3-inv.stock;
var cat='comida';DB.menu.forEach(function(m){var r=DB.recipes.find(function(x){return x.menuId===m.id});if(r&&r.ingredients.some(function(i){return i.inventoryId===inv.id})){cat=m.category}});
sug[inv.id]={name:inv.name,qty:Math.max(0,buy),unit:inv.unit,reason:'Stock bajo',category:cat}}});
DB.menu.forEach(function(dish){
var recipe=DB.recipes.find(function(r){return r.menuId===dish.id});
if(!recipe)return;
recipe.ingredients.forEach(function(ing){
var inv=DB.inventory.find(function(i){return i.id===ing.inventoryId});
if(inv&&inv.stock<=inv.alertMin*2){var need=(inv.alertMin*4)-inv.stock;if(need>0&&(!sug[ing.inventoryId]||sug[ing.inventoryId].qty<need))sug[ing.inventoryId]={name:inv.name,qty:need,unit:inv.unit,reason:'Para '+dish.name,category:dish.category}}})
});
for(var id in sug)DB.shoppingList.push(sug[id]);
showToast('Lista generada: '+DB.shoppingList.length+' insumos');renderAdminCompras()}

/* ===== ADMIN CIERRE DE CAJA ===== */
function renderAdminCierre(){
var hoy=new Date();hoy.setHours(0,0,0,0);
var todaySales=DB.salesHistory.filter(function(s){return s.closedAt>=hoy.getTime()});
var hoyTotal=todaySales.reduce(function(s,x){return s+x.total},0);
var hoyComs=todaySales.reduce(function(s,x){return s+(x.comandaCount||1)},0);
var egresosHoy=DB.egresos.filter(function(e){return e.createdAt>=hoy.getTime()});
var totalEgresos=egresosHoy.reduce(function(s,x){return s+x.monto},0);
var utilidad=hoyTotal-totalEgresos;
var metodoPagos={efectivo:0,yape:0,plin:0,tarjeta:0,transferencia:0,mixto:0,mercado_pago:0};
todaySales.forEach(function(s){var pm=s.paymentMethod||'efectivo';metodoPagos[pm]=(metodoPagos[pm]||0)+s.total});
var totalPM=Object.values(metodoPagos).reduce(function(s,x){return s+x},0);
var estadoCaja=currentApertura?'<span style=color:var(--green)><i class="fas fa-check-circle"></i> Caja Abierta</span>':'<span style=color:var(--text-muted)><i class="fas fa-times-circle"></i> Caja Cerrada</span>';
var initAmt=currentApertura?currentApertura.montoInicial:0;
var dineroEsperado=initAmt+hoyTotal-totalEgresos;

function openAperturaCaja(){var cashD=DB.cashDesks.find(function(c){return c.cajeraId===currentUser.id});var cashN=cashD?cashD.name:'Caja no asignada';openModal('<div class=modal-title style=text-align:center><i class="fas fa-cash-register" style=color:var(--green);margin-right:8px></i> Apertura de Caja</div><div style=background:var(--bg-dark);border-radius:10px;padding:16px;margin-bottom:18px><div style=display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:.85rem><div style=color:var(--text-muted)>Fecha:</div><div style=font-weight:700>'+new Date().toLocaleDateString('es-PE',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</div><div style=color:var(--text-muted)>Hora:</div><div style=font-weight:700>'+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})+'</div><div style=color:var(--text-muted)>Usuario:</div><div style=font-weight:700>'+currentUser.name+'</div><div style=color:var(--text-muted)>Caja:</div><div style=font-weight:700>'+cashN+'</div></div></div><div class=form-group><label style=color:var(--green);font-weight:700><i class="fas fa-coins" style=margin-right:5px></i> Monto Inicial (S/)</label><input type=number id=apertura-monto class="form-control form-control-lg" value=300 step=10 min=0 placeholder="0.00" onkeydown="if(event.key===\'Enter\')saveAperturaCaja()"></div><div style=display:flex;gap:10px><button class="btn btn-green" style=flex:1;padding:14px onclick=saveAperturaCaja()><i class="fas fa-check"></i> Abrir Caja</button><button class="btn" style=padding:14px 18px;background:var(--bg-hover);color:var(--text)" onclick=closeModal()>Cancelar</button></div>');setTimeout(function(){var i=document.getElementById('apertura-monto');if(i){i.focus();i.select()}},100)}

/* ===== VISTA MOZO - COMANDAS MULTIPLES ===== */
function renderMozoPedidos(){
    var my=DB.tables.filter(function(t){return t.mozoId===currentUser.id});
    if(!my.length){document.getElementById('v-mozo-pedidos').innerHTML='<div style="text-align:center;padding-top:20vh;color:var(--text-muted)"><h2>Sin mesas asignadas</h2></div>';return}
    var h='',map={};
    my.forEach(function(t){if(!map[t.areaId])map[t.areaId]=[];map[t.areaId].push(t)});
    for(var aId in map){
        h+='<div class="area-header"><i class="fas fa-map-marker-alt"></i> '+getAreaName(parseInt(aId))+'</div><div class="grid grid-3" style="margin-bottom:30px">';
        map[aId].forEach(function(t){
            var stText,stColor;
            if(t.status==='cocina'){stText='EN COCINA';stColor='blue'}
            else if(t.status==='listo'){stText='LISTO';stColor='purple'}
            else if(t.status==='ocupada'){stText='OCUPADA';stColor='green'}
            else{stText='TOMAR PEDIDO';stColor='amber'}
            var comandaCount=0;
            if(t.orderId){var order=DB.orders.find(function(o){return o.id===t.orderId});if(order)comandaCount=order.comandaCount||1}
            var comandaHTML='';
            if(comandaCount>0&&(t.status==='cocina'||t.status==='listo'||t.status==='ocupada')){
                comandaHTML='<div class="comanda-badge"><i class="fas fa-layer-group"></i> '+comandaCount+' comanda'+(comandaCount>1?'s':'')+' &middot; <i class="fas fa-plus-circle"></i> Agregar</div>';
            }
            h+='<div class="mesa '+t.status+'" onclick="openPedidoModal('+t.id+')"><h3>'+t.name+'</h3><p style="color:var(--'+stColor+')">'+stText+'</p>'+comandaHTML+'</div>';
        });
        h+='</div>';
    }
    document.getElementById('v-mozo-pedidos').innerHTML=h;
}

function updateOrderTotal(tableId){
    try{
        var total=0;
        DB.menu.forEach(function(m){
            var el=document.getElementById('qty-'+m.id);
            if(el){var q=parseInt(el.value)||0;if(q>0){total+=q*m.price}}
        });
        var historical=0;
        var table=DB.tables.find(function(t){return t.id===tableId});
        if(table&&table.orderId){
            var existingOrder=DB.orders.find(function(o){return o.id===table.orderId});
            if(existingOrder)historical=existingOrder.items.reduce(function(s,i){return s+i.price*i.qty},0);
        }
        var display=document.getElementById('orderTotalAmount');
        if(display)display.textContent='S/'+(historical+total).toFixed(2);
        var histDisplay=document.getElementById('orderHistoricalTotal');
        if(histDisplay)histDisplay.textContent='S/'+historical.toFixed(2);
        var subDisplay=document.getElementById('orderSubtotalAmount');
        if(subDisplay)subDisplay.textContent='S/'+total.toFixed(2);
    }catch(e){}
}
function openPedidoModal(tableId){
    var table=DB.tables.find(function(t){return t.id===tableId});
    var existingOrder=table.orderId?DB.orders.find(function(o){return o.id===table.orderId}):null;
    var isAdditional=!!existingOrder;
    var nextComanda=isAdditional?(existingOrder.comandaCount||1)+1:1;
    var comandaCount=isAdditional?(existingOrder.comandaCount||1):0;
    var h='';
    if(isAdditional){
        h+='<div class="modal-title" style="border-bottom-color:rgba(245,158,11,.3)"><span style="color:var(--amber)"><i class="fas fa-plus-circle" style="margin-right:6px"></i> PEDIDO ADICIONAL</span> - Comanda #'+nextComanda+'<br><small style="color:var(--text-muted);font-weight:normal">'+table.name+' &middot; '+getAreaName(table.areaId)+'</small></div>';
        h+='<div class="additional-notice"><div class="additional-notice-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="additional-notice-text"><h4>Esta mesa ya tiene '+comandaCount+' comanda'+(comandaCount>1?'s':'')+' enviada'+(comandaCount>1?'s':'')+'</h4><p>Los items de abajo ya estan en cocina. Agrega solo los nuevos.</p></div></div>';
        var comandas=getComandaNumbers(existingOrder.items);
        comandas.forEach(function(cn){
            var cItems=existingOrder.items.filter(function(i){return(i.comanda||1)===cn});
            var subTot=cItems.reduce(function(s,i){return s+i.price*i.qty},0);
            h+='<div class="comanda-section comanda-prev"><div class="comanda-label prev"><i class="fas fa-receipt"></i> Comanda #'+cn+' <span class="comanda-time">(&middot; S/ '+subTot.toFixed(2)+')</span></div>';
            cItems.forEach(function(i){h+='<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.04)"><span><span style="color:var(--text-muted);font-weight:800;margin-right:6px">x'+i.qty+'</span> '+i.name+'</span><span style="color:var(--text-muted)">S/ '+(i.price*i.qty).toFixed(2)+'</span></div>'});
            h+='</div>';
        });
    }else{
        h+='<div class="modal-title">NUEVO PEDIDO - '+table.name+'<br><small style="color:var(--cyan);font-weight:normal">'+getAreaName(table.areaId)+'</small></div>';
    }
    h+='<div style="margin-top:10px;margin-bottom:8px;font-size:.78rem;color:var(--cyan);text-transform:uppercase;letter-spacing:.5px;font-weight:700">'+(isAdditional?'<i class="fas fa-plus" style="margin-right:5px"></i> AGREGAR A COMANDA #'+nextComanda:'<i class="fas fa-utensils" style="margin-right:5px"></i> SELECCIONAR PLATOS')+'</div>';

    h+='</div>';
    var historicalTotal=0;
    if(existingOrder)historicalTotal=existingOrder.items.reduce(function(s,i){return s+i.price*i.qty},0);

    }

function sendOrder(tableId){
    var table=DB.tables.find(function(t){return t.id===tableId});
    var allItems=[],has=false,errors=[];
    DB.menu.forEach(function(m){
        var q=parseInt(document.getElementById('qty-'+m.id).value)||0;
        if(q>0){
            if(q>m.stock){errors.push(m.name+': solo queda '+m.stock+' (pediste '+q+')')}
            else{allItems.push({menuId:m.id,name:m.name,qty:q,price:m.price,category:m.category});has=true}
        }
    });
    var errDiv=document.getElementById('orderErrorMsg');
    if(errors.length){
        if(errDiv)errDiv.innerHTML='<div style="padding:10px 14px;margin-bottom:10px;background:rgba(214,69,69,.12);border:1px solid rgba(214,69,69,.25);border-radius:8px;color:var(--red);font-size:.82rem"><i class="fas fa-exclamation-circle" style="margin-right:6px"></i> <strong>Stock insuficiente:</strong><br>'+errors.join('<br>')+'</div>';
        showToast('Stock insuficiente en algunos productos','error');
        return;
    }else if(errDiv){errDiv.innerHTML=''}
    if(!has){showToast('Agregue al menos un producto','warning');return}
    var insumoErrors=validateInventoryForOrder(allItems);
    if(insumoErrors.length){
        if(errDiv)errDiv.innerHTML='<div style="padding:10px 14px;margin-bottom:10px;background:rgba(214,69,69,.12);border:1px solid rgba(214,69,69,.25);border-radius:8px;color:var(--red);font-size:.82rem"><i class="fas fa-exclamation-circle" style="margin-right:6px"></i> <strong>Stock insuficiente en insumos:</strong><br>'+insumoErrors.join('<br>')+'</div>';
        showToast('Stock insuficiente en insumos de cocina','error');
        return;
    }else if(errDiv){errDiv.innerHTML=''}
    var menuDeducted=false;
    try{
        allItems.forEach(function(i){var m=DB.menu.find(function(x){return x.id===i.menuId});if(m){m.stock-=i.qty;if(m.stock<=0)showToast(m.name+' AGOTADO!','error')}});
        menuDeducted=true;
        if(!deductInventoryFromOrder(allItems)){
            allItems.forEach(function(i){var m=DB.menu.find(function(x){return x.id===i.menuId});if(m)m.stock+=i.qty});
            menuDeducted=false;
            if(errDiv)errDiv.innerHTML='<div style="padding:10px 14px;margin-bottom:10px;background:rgba(214,69,69,.12);border:1px solid rgba(214,69,69,.25);border-radius:8px;color:var(--red);font-size:.82rem"><i class="fas fa-exclamation-circle" style="margin-right:6px"></i> <strong>Error al descontar insumos.</strong> Revise inventario.</div>';
            return;
        }
        var kitchenItems=allItems.filter(function(i){return requiresCocina(i.category)});
        var directItems=allItems.filter(function(i){return!requiresCocina(i.category)});
        var msgParts=[],comandaNum=1;
        if(kitchenItems.length){
            if(table.orderId){
                var o=DB.orders.find(function(x){return x.id===table.orderId});
                if(!o){var nId=DB.counters.order++;comandaNum=1;kitchenItems.forEach(function(i){i.comanda=1;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});DB.orders.push({id:nId,tableId:table.id,mozoId:currentUser.id,items:kitchenItems,status:'cocina',createdAt:Date.now(),comandaCount:1});table.orderId=nId;table.status='cocina';msgParts.push('Comanda #1 a cocina')}
                else{comandaNum=(o.comandaCount||1)+1;kitchenItems.forEach(function(i){i.comanda=comandaNum;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});o.items=o.items.concat(kitchenItems);o.comandaCount=comandaNum;o.status='cocina';table.status='cocina';msgParts.push('Comanda #'+comandaNum+' a cocina')}
            }else{
                var nId=DB.counters.order++;
                comandaNum=1;
                kitchenItems.forEach(function(i){i.comanda=1;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});
                DB.orders.push({id:nId,tableId:table.id,mozoId:currentUser.id,items:kitchenItems,status:'cocina',createdAt:Date.now(),comandaCount:1});
                table.orderId=nId;table.status='cocina';
                msgParts.push('Comanda #1 a cocina');
            }
        }
        if(directItems.length){
            if(table.orderId&&!kitchenItems.length){
                var o=DB.orders.find(function(x){return x.id===table.orderId});
                if(!o){var nId2=DB.counters.order++;comandaNum=1;directItems.forEach(function(i){i.comanda=1;i.directo=true;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});DB.orders.push({id:nId2,tableId:table.id,mozoId:currentUser.id,items:directItems,status:'directo',createdAt:Date.now(),comandaCount:1});table.orderId=nId2;table.status='ocupada'}
                else{var dc=o.comandaCount||1;comandaNum=dc;directItems.forEach(function(i){i.comanda=dc;i.directo=true;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});o.items=o.items.concat(directItems);if(!table.status||table.status==='libre')table.status='ocupada'}
            }else if(table.orderId){
                var o=DB.orders.find(function(x){return x.id===table.orderId});
                if(!o){var nId2=DB.counters.order++;comandaNum=1;directItems.forEach(function(i){i.comanda=1;i.directo=true;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});DB.orders.push({id:nId2,tableId:table.id,mozoId:currentUser.id,items:directItems,status:'directo',createdAt:Date.now(),comandaCount:1});table.orderId=nId2;table.status='ocupada'}
                else{directItems.forEach(function(i){i.comanda=(o.comandaCount||1);i.directo=true;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});o.items=o.items.concat(directItems)}
            }else{
                var nId2=DB.counters.order++;
                comandaNum=1;
                directItems.forEach(function(i){i.comanda=1;i.directo=true;i.comandaCreatedAt=Date.now();i.estadoPlato='pendiente'});
                DB.orders.push({id:nId2,tableId:table.id,mozoId:currentUser.id,items:directItems,status:'directo',createdAt:Date.now(),comandaCount:1});
                table.orderId=nId2;table.status='ocupada';
            }
            msgParts.push(directItems.length+' directo(s)');
        }
        var printItems=allItems.filter(function(i){return requiresCocina(i.category)||i.category==='bebidas'||i.category==='chicha'||i.category==='helados'||i.category==='postres'});
        if(printItems.length){autoPrintComanda(table,printItems,getName(currentUser.id),comandaNum,'')}
        var orderTotal=allItems.reduce(function(s,i){return s+i.price*i.qty},0),orderQty=allItems.reduce(function(s,i){return s+i.qty},0);
        logAudit(currentUser.id,'Envio de pedido','Mesa '+table.name+': '+orderQty+' items, total S/ '+orderTotal.toFixed(2)+' ('+msgParts.join(' | ')+')');
        if(kitchenItems.length)try{if(kitchenChannel)kitchenChannel.postMessage({type:'new-order',orderId:table.orderId,tableName:table.name})}catch(e){}
        try{if(window.kitchenChannel)kitchenChannel.postMessage({type:'new-order-caja',tableId:table.id})}catch(e){}
        closeModal();playBeep();showToast(msgParts.join(' | '),'success');renderMozoPedidos();
    }catch(e){
        console.error('Error en sendOrder:',e);
        if(menuDeducted){allItems.forEach(function(i){var m=DB.menu.find(function(x){return x.id===i.menuId});if(m)m.stock+=i.qty})}
        showToast('Error al procesar el pedido: '+e.message,'error');
        if(errDiv)errDiv.innerHTML='<div style="padding:10px 14px;background:rgba(214,69,69,.12);border:1px solid rgba(214,69,69,.25);border-radius:8px;color:var(--red);font-size:.82rem"><i class="fas fa-exclamation-circle"></i> <strong>Error interno:</strong> '+e.message+'</div>';
    }
}

function anularPedidoMozo(tableId){actionWithPassword('Anular Pedido','Se cancelara TODO el pedido (todas las comandas) y se devolvera el stock.',function(){var t=DB.tables.find(function(x){return x.id===tableId});var o=DB.orders.find(function(x){return x.id===t.orderId});if(o){restoreInventoryFromOrder(o.items);o.items.forEach(function(i){var m=DB.menu.find(function(x){return x.id===i.menuId});if(m)m.stock+=i.qty});logAudit(currentUser.id,'Anulacion de pedido (mozo)','Mesa '+t.name+': pedido '+o.id+' cancelado, stock devuelto');DB.orders=DB.orders.filter(function(x){return x.id!==t.orderId})}t.status='libre';t.mozoId=null;t.orderId=null;saveDB();try{if(window.kitchenChannel)kitchenChannel.postMessage({type:'order-cancelled',tableId:tableId})}catch(e){};closeModal();showToast('Pedido anulado. Stock devuelto.','warning');renderMozoPedidos()})}

/* ===== VISTA COCINA - COMANDAS SEPARADAS CON DISH-LEVEL TIMERS ===== */
function renderCocinaPedidos(filterCat){
    var el=document.getElementById('v-cocina-pedidos');
    var allOrders=DB.orders.filter(function(o){return o.status==='cocina'||o.status==='preparacion'});
    kitchenTimers.forEach(function(t){clearInterval(t)});kitchenTimers=[];
    var cats=['todas','comida'];
    var catNames={todas:'Todas',comida:'Comida'};
    if(!filterCat)filterCat='todas';
    var pend=allOrders.filter(function(o){return o.items.some(function(i){return requiresCocina(i.category||(DB.menu.find(function(m){return m.id===i.menuId})||{}).category)})});
    if(filterCat!=='todas')pend=pend.filter(function(o){return o.items.some(function(i){var cat=i.category||(DB.menu.find(function(m){return m.id===i.menuId})||{}).category;return cat===filterCat&&requiresCocina(cat)})});
    pend.sort(function(a,b){return a.createdAt-b.createdAt});
    if(!pend.length){el.innerHTML='<div class=area-tabs style=margin-bottom:20px>'+cats.map(function(c){return'<button class="area-tab'+(c===filterCat?' active':'')+'" onclick="renderCocinaPedidos(\''+c+'\')">'+catNames[c]+'</button>'}).join('')+'</div><div style="text-align:center;padding-top:15vh;color:var(--text-muted)"><h2>Sin pedidos pendientes</h2></div>';return}
    // Detect new orders for sound alert
    var newIds=allOrders.filter(function(o){return kitchenKnownOrderIds.indexOf(o.id)===-1}).map(function(o){return o.id});
    if(newIds.length&&document.querySelector('.menu-item.active')&&document.querySelector('.menu-item.active').getAttribute('data-route')==='cocina-pedidos'){playKitchenAlert()}
    newIds.forEach(function(id){if(kitchenKnownOrderIds.indexOf(id)===-1)kitchenKnownOrderIds.push(id)});
    // count urgent overdue items
    var urgentCount=0;
    pend.forEach(function(o){o.items.forEach(function(i){if(!requiresCocina(i.category||(DB.menu.find(function(m){return m.id===i.menuId})||{}).category))return;var pt=(DB.menu.find(function(m){return m.id===i.menuId})||{}).prepTime||1;if(Date.now()-o.createdAt>pt*60000)urgentCount++})});
    var h='<div class=area-tabs style=margin-bottom:20px>'+cats.map(function(c){return'<button class="area-tab'+(c===filterCat?' active':'')+'" onclick="renderCocinaPedidos(\''+c+'\')">'+catNames[c]+'</button>'}).join('')+'</div>';
    if(urgentCount>0)h+='<div class="kitchen-urgent-banner"><i class="fas fa-exclamation-triangle"></i><span>'+urgentCount+' plato'+(urgentCount>1?'s':'')+' con retraso</span></div>';
    h+='<div class="grid grid-3">';
    h+=pend.map(function(o){
        var t=DB.tables.find(function(x){return x.id===o.tableId});
        var kitchenItems=o.items.filter(function(i){return requiresCocina(i.category||(DB.menu.find(function(m){return m.id===i.menuId})||{}).category)});
        var comandas=getComandaNumbers(kitchenItems);
        var isMulti=comandas.length>1;
        var itemsHtml='';
        var hasOverdue=false;
        function renderDishItem(i,comandaLabel){
            var m=DB.menu.find(function(x){return x.id===i.menuId});
            var pt=(m?m.prepTime:1)||1;
            var catTag=m?' <span style="font-size:.6rem;color:var(--text-muted)">['+getMenuCategoryName(m.category)+']</span>':'';
            var elapsed=Date.now()-o.createdAt;
            var totalMs=pt*60000;
            var remaining=totalMs-elapsed;
            var pct=Math.min(100,Math.max(0,(elapsed/totalMs)*100));
            var timerCls='ok',itemCls='',progCls='ok';
            var timerText='';
            if(remaining>0){
                var rm=Math.floor(remaining/60000),rs=Math.floor((remaining%60000)/1000);
                timerText='-'+String(rm).padStart(2,'0')+':'+String(rs).padStart(2,'0');
                if(pct>=80){timerCls='warn';itemCls='timer-warning';progCls='warn'}
            }else{
                var over=Math.abs(remaining),om=Math.floor(over/60000),os=Math.floor((over%60000)/1000);
                timerText='+'+String(om).padStart(2,'0')+':'+String(os).padStart(2,'0');
                timerCls='over';itemCls='timer-danger';progCls='over';
                hasOverdue=true;
            }
            var label=comandaLabel?'<span style="font-size:.65rem;color:var(--amber);font-weight:700;display:block;margin-bottom:2px"><i class="fas fa-plus-circle"></i> COMANDA #'+comandaLabel+'</span>':'';
            var estado=i.estadoPlato||'pendiente';
            var btnHtml='';
            if(estado==='pendiente'){
                btnHtml='<button class="btn btn-blue btn-xs" onclick="event.stopPropagation();marcarEnPrep('+o.id+','+i.menuId+','+(i.comanda||1)+')" style="margin-top:6px;font-size:.7rem;padding:3px 8px"><i class="fas fa-fire"></i> En Preparacion</button>';
            }else if(estado==='preparacion'){
                btnHtml='<button class="btn btn-green btn-xs" onclick="event.stopPropagation();marcarPlatoListo('+o.id+','+i.menuId+','+(i.comanda||1)+')" style="margin-top:6px;font-size:.7rem;padding:3px 8px"><i class="fas fa-check"></i> Listo</button>';
            }else if(estado==='listo'){
                btnHtml='<span style="font-size:.7rem;color:var(--green);font-weight:700;display:block;margin-top:4px"><i class="fas fa-check-circle"></i> LISTO</span>';
            }
            return'<div class="kitchen-dish-item '+itemCls+'" id="di-'+o.id+'-'+i.menuId+'-'+(i.comanda||1)+'">'+label+'<div class="kitchen-dish-header"><span class="kitchen-dish-name"><strong>x'+i.qty+'</strong> '+i.name+catTag+'</span><span class="kitchen-dish-timer '+timerCls+'">'+timerText+'</span></div><div class="kitchen-dish-progress"><div class="kitchen-dish-progress-fill '+progCls+'" style="width:'+pct+'%"></div></div>'+btnHtml+'</div>';
        }
        var firstItems=kitchenItems.filter(function(i){return(i.comanda||1)===comandas[0]});
        firstItems.forEach(function(i){itemsHtml+=renderDishItem(i,null)});
        if(isMulti){
            for(var c=1;c<comandas.length;c++){
                var extraItems=kitchenItems.filter(function(i){return(i.comanda||1)===comandas[c]});
                extraItems.forEach(function(i){itemsHtml+=renderDishItem(i,comandas[c])});
            }
        }
        var age=Date.now()-o.createdAt;
        var ageMin=Math.floor(age/60000);
        var ageColor=ageMin>20?'var(--red)':ageMin>10?'var(--amber)':'var(--text-muted)';
        var comandaInfo=isMulti?'<span style="font-size:.7rem;background:rgba(245,158,11,.2);color:var(--amber);padding:2px 8px;border-radius:6px;font-weight:700">'+o.comandaCount+' comandas</span>':'';
        var agedBadge='<span style="font-size:.7rem;color:'+ageColor+';font-weight:600;margin-left:6px">'+ageMin+' min</span>';
        return'<div class="card kitchen-card'+(hasOverdue?' late':'')+'" id="oc-'+o.id+'"><div class="card-header"><span class="card-title" style="color:var(--blue)">'+t.name+'</span><span style="font-size:.8rem;color:var(--text-muted)">Mozo: '+getName(o.mozoId)+'</span></div><div style="font-size:.7rem;color:var(--cyan);text-align:right;margin-bottom:10px">'+getAreaName(t.areaId)+' '+comandaInfo+agedBadge+'</div><div>'+itemsHtml+'</div></div>';
    }).join('')+'</div>';
    el.innerHTML=h;
    // Per-dish timer updates
    pend.forEach(function(o){
        var intv=setInterval(function(){
            var card=document.getElementById('oc-'+o.id);
            if(!card){clearInterval(intv);return}
            var hasLate=false;
            o.items.forEach(function(i){
                if(!requiresCocina(i.category||(DB.menu.find(function(m){return m.id===i.menuId})||{}).category))return;
                var m=DB.menu.find(function(x){return x.id===i.menuId});
                var pt=(m?m.prepTime:1)||1;
                var totalMs=pt*60000;
                var elapsed=Date.now()-o.createdAt;
                var remaining=totalMs-elapsed;
                var pct=Math.min(100,Math.max(0,(elapsed/totalMs)*100));
                var elId='di-'+o.id+'-'+i.menuId+'-'+(i.comanda||1);
                var dishEl=document.getElementById(elId);
                if(!dishEl)return;
                var timerEl=dishEl.querySelector('.kitchen-dish-timer');
                var fillEl=dishEl.querySelector('.kitchen-dish-progress-fill');
                if(remaining>0){
                    var rm=Math.floor(remaining/60000),rs=Math.floor((remaining%60000)/1000);
                    if(timerEl)timerEl.innerText='-'+String(rm).padStart(2,'0')+':'+String(rs).padStart(2,'0');
                    if(timerEl){timerEl.className='kitchen-dish-timer'+(pct>=80?' warn':' ok')};
                    if(fillEl){fillEl.className='kitchen-dish-progress-fill'+(pct>=80?' warn':' ok');fillEl.style.width=pct+'%'};
                    dishEl.className='kitchen-dish-item'+(pct>=80?' timer-warning':'');
                }else{
                    var over=Math.abs(remaining),om=Math.floor(over/60000),os=Math.floor((over%60000)/1000);
                    if(timerEl)timerEl.innerText='+'+String(om).padStart(2,'0')+':'+String(os).padStart(2,'0');
                    if(timerEl)timerEl.className='kitchen-dish-timer over';
                    if(fillEl){fillEl.className='kitchen-dish-progress-fill over';fillEl.style.width='100%'};
                    dishEl.className='kitchen-dish-item timer-danger';
                    hasLate=true;
                }
            });
            card.className='card kitchen-card'+(hasLate?' late':'');
            // Update urgent banner
            var banner=el.querySelector('.kitchen-urgent-banner');

/* ===== KITCHEN SOUND QUEUE ===== */
function playKitchenAlert(){
    var cfg=DB.sysconfig.kitchenSounds;
    // voice alert
    if(cfg.voiceEnabled&&window.speechSynthesis){
        try{var u=new SpeechSynthesisUtterance('Nuevo pedido');u.lang='es-PE';u.volume=cfg.volume;u.rate=1.1;window.speechSynthesis.speak(u)}catch(e){}
    }
    var sounds=cfg.customSounds;
    if(!sounds||!sounds.length){
        // fallback: play a beep pattern
        try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=660;o.type='sine';g.gain.value=cfg.volume*.5;o.start();setTimeout(function(){o.frequency.value=880;g.gain.value=cfg.volume*.3},120);setTimeout(function(){o.frequency.value=1100;g.gain.value=cfg.volume*.2},240);setTimeout(function(){o.stop();ctx.close()},500)}catch(e){}
        return
    }
    // pick a random sound, different from last
    var idx=Math.floor(Math.random()*sounds.length);
    if(sounds.length>1&&idx===cfg.lastSoundIndex)idx=(idx+1)%sounds.length;
    DB.sysconfig.kitchenSounds.lastSoundIndex=idx;
    kitchenSoundQueue.push(sounds[idx]);
    if(!kitchenSoundPlaying)playKitchenSoundFromQueue();
}
function playKitchenSoundFromQueue(){
    if(!kitchenSoundQueue.length){kitchenSoundPlaying=false;return}
    kitchenSoundPlaying=true;
    var src=kitchenSoundQueue.shift();
    try{
        var audio=new Audio(src);
        audio.volume=DB.sysconfig.kitchenSounds.volume||0.7;
        audio.onended=function(){setTimeout(playKitchenSoundFromQueue,200)};
        audio.onerror=function(){setTimeout(playKitchenSoundFromQueue,200)};
        audio.play().catch(function(){setTimeout(playKitchenSoundFromQueue,200)});
    }catch(e){setTimeout(playKitchenSoundFromQueue,200)}
}
/* ===== KITCHEN POLLING ===== */
function startKitchenPolling(){
    if(kitchenPollInterval)clearInterval(kitchenPollInterval);
    // initialize known order IDs
    kitchenKnownOrderIds=DB.orders.filter(function(o){return o.status==='cocina'}).map(function(o){return o.id});
    kitchenPollInterval=setInterval(function(){
        var active=document.querySelector('.menu-item.active');
        if(!active||active.getAttribute('data-route')!=='cocina-pedidos')return;
        var currentIds=DB.orders.filter(function(o){return o.status==='cocina'}).map(function(o){return o.id});
        var newIds=currentIds.filter(function(id){return kitchenKnownOrderIds.indexOf(id)===-1});
        if(newIds.length){
            newIds.forEach(function(id){if(kitchenKnownOrderIds.indexOf(id)===-1)kitchenKnownOrderIds.push(id)});
            playKitchenAlert();
        }
        // clean up stale IDs
        kitchenKnownOrderIds=kitchenKnownOrderIds.filter(function(id){return currentIds.indexOf(id)!==-1});
    },5000);
}
function stopKitchenPolling(){
    if(kitchenPollInterval){clearInterval(kitchenPollInterval);kitchenPollInterval=null}
}

function verRecibo(tableId){

    var tot=o.items.reduce(function(s,i){return s+i.price*i.qty},0);
    var comandas=getComandaNumbers(o.items);
    var isMulti=comandas.length>1;
    var h='<div class="modal-title" style="text-align:center">COBRAR - '+t.name+'<br><small style="color:var(--cyan);font-weight:normal">'+getAreaName(t.areaId)+' | Mozo: '+getName(o.mozoId)+(isMulti?' | <span style="color:var(--amber)">'+o.comandaCount+' comandas</span>':'')+'</small></div>';
    if(isMulti){
        comandas.forEach(function(cn){
            var cItems=o.items.filter(function(i){return(i.comanda||1)===cn});
            var isLast=cn===comandas[comandas.length-1];
            h+='<div class="comanda-section '+(isLast?'comanda-new':'comanda-prev')+'"><div class="comanda-label '+(isLast?'new':'prev')+'"><i class="fas fa-receipt"></i> Comanda #'+cn+'</div>';
            cItems.forEach(function(i){h+='<div class="receipt-line"><span>x'+i.qty+' '+i.name+'</span><span>S/ '+(i.price*i.qty).toFixed(2)+'</span></div>'});

    h+='<label class="payment-option" style="flex:1;min-width:70px;padding:8px;border:2px solid var(--border-subtle);border-radius:8px;text-align:center;cursor:pointer;background:rgba(16,185,129,.1);border-color:var(--green)"><input type="radio" name="pm-'+tableId+'" value="efectivo" checked hidden><i class="fas fa-money-bill-wave" style="color:var(--green);font-size:1.2rem;display:block"></i><span style="font-size:.7rem">Efectivo</span></label>';
    h+='<label class="payment-option" style="flex:1;min-width:70px;padding:8px;border:2px solid var(--border-subtle);border-radius:8px;text-align:center;cursor:pointer"><input type="radio" name="pm-'+tableId+'" value="yape" hidden><i class="fas fa-mobile-alt" style="color:var(--blue);font-size:1.2rem;display:block"></i><span style="font-size:.7rem">Yape</span></label>';
    h+='<label class="payment-option" style="flex:1;min-width:70px;padding:8px;border:2px solid var(--border-subtle);border-radius:8px;text-align:center;cursor:pointer"><input type="radio" name="pm-'+tableId+'" value="plin" hidden><i class="fas fa-mobile-alt" style="color:var(--purple);font-size:1.2rem;display:block"></i><span style="font-size:.7rem">Plin</span></label>';
    h+='<label class="payment-option" style="flex:1;min-width:70px;padding:8px;border:2px solid var(--border-subtle);border-radius:8px;text-align:center;cursor:pointer"><input type="radio" name="pm-'+tableId+'" value="tarjeta" hidden><i class="fas fa-credit-card" style="color:var(--amber);font-size:1.2rem;display:block"></i><span style="font-size:.7rem">Tarjeta</span></label>';
    h+='</div></div>';
    h+='<div style="margin-top:10px;padding:12px;background:var(--bg-dark);border-radius:8px"><div style="font-size:.8rem;color:var(--text-muted);margin-bottom:8px;font-weight:600"><i class="fas fa-file-invoice"></i> Datos Factura (opcional)</div><div style="display:flex;gap:8px"><input type="text" id="inv-doc-'+tableId+'" class="form-control" placeholder="RUC / DNI" style="flex:1"><input type="text" id="inv-name-'+tableId+'" class="form-control" placeholder="Razon Social" style="flex:2"></div></div>';
    h+='<button class="btn btn-green" style="width:100%;margin-top:20px;padding:15px" onclick="confirmarCobro('+tableId+')"><i class="fas fa-check-double"></i> Confirmar Pago</button>';
    h+='<button class="btn btn-red" style="width:100%;margin-top:10px;padding:12px" onclick="anularPedidoCajera('+tableId+')"><i class="fas fa-ban"></i> Anular Pedido</button>';

        });
    },100);
}

function confirmarCobro(tableId){
    var t=DB.tables.find(function(x){return x.id===tableId});
    var o=DB.orders.find(function(x){return x.id===t.orderId});
    if(!o)return;
    var pmEl=document.querySelector('input[name="pm-'+tableId+'"]:checked');
    var pm=pmEl?pmEl.value:'efectivo';
    var invDoc=document.getElementById('inv-doc-'+tableId)?document.getElementById('inv-doc-'+tableId).value.trim():'';
    var invName=document.getElementById('inv-name-'+tableId)?document.getElementById('inv-name-'+tableId).value.trim():'';
    o.status='cerrado';o.closedAt=Date.now();o.tableName=t.name;o.mozoName=getName(o.mozoId);o.total=o.items.reduce(function(s,i){return s+i.price*i.qty},0);o.comandaCount=o.comandaCount||1;
    o.paymentMethod=pm;
    if(invDoc)o.invoiceDoc=invDoc;
    if(invName)o.invoiceName=invName;
    // Imprimir ticket / factura
    autoPrintReceipt(t,o.items,o.total,pm);
    DB.salesHistory.push(o);
    DB.orders=DB.orders.filter(function(x){return x.id!==t.orderId});
    t.status='libre';t.mozoId=null;t.orderId=null;
    logAudit(currentUser.id,'Cobro confirmado','Mesa '+t.name+': S/ '+(o.total||0).toFixed(2)+', metodo: '+pm+(invDoc?' / Doc: '+invDoc:'')+(invName?' / Cliente: '+invName:''));
    try{if(window.kitchenChannel)kitchenChannel.postMessage({type:'order-closed',tableId:tableId})}catch(e){}
    playBeep(600,.3);closeModal();showToast('Mesa cobrada ('+pm+')');renderCajeraCaja();
}

function anularPedidoCajera(tableId){actionWithPassword('Anular Pedido','Se cancelara el pedido, se devolvera el stock a la carta y se liberara la mesa.',function(){var t=DB.tables.find(function(x){return x.id===tableId});var o=DB.orders.find(function(x){return x.id===t.orderId});if(o){o.items.forEach(function(i){var m=DB.menu.find(function(x){return x.id===i.menuId});if(m)m.stock+=i.qty});logAudit(currentUser.id,'Anulacion de pedido (cajera)','Mesa '+t.name+': pedido '+o.id+' cancelado, stock devuelto');DB.orders=DB.orders.filter(function(x){return x.id!==t.orderId})}t.status='libre';t.mozoId=null;t.orderId=null;closeModal();showToast('Pedido anulado. Stock devuelto.','warning');renderCajeraCaja()})}

function renderPublicMenu(filterCat){
    var cats={};DB.menu.forEach(function(m){if(!cats[m.category])cats[m.category]=0;cats[m.category]++});
    var catKeys=Object.keys(cats);
    if(!filterCat||catKeys.indexOf(filterCat)===-1)filterCat=catKeys[0]||'comida';
    var items=DB.menu.filter(function(m){return m.category===filterCat});
    var catHtml=catKeys.map(function(c){return'<button class="cat-btn'+(c===filterCat?' active':'')+'" onclick="renderPublicMenu(\''+c+'\')">'+getPublicMenuCategoryName(c)+'</button>'}).join('');
    var itemsHtml=items.map(function(m){
        var q=publicCart[m.id]||0;
        var btnHtml='<div class="item-actions">'+
            (q>0?'<button class="qty-btn minus" onclick="publicCartDec('+m.id+')"><i class="fas fa-minus"></i></button>':'')+
            '<span class="item-qty">'+(q>0?q:'')+'</span>'+
            '<button class="qty-btn" onclick="publicCartInc('+m.id+')"><i class="fas fa-plus"></i></button>'+
            '</div>';
        return'<div class="public-menu-item"><div class="item-info"><h4>'+m.name+'</h4><small>'+getPublicMenuCategoryName(m.category)+'</small></div><div style="display:flex;align-items:center">'+
            '<span class="item-price">S/ '+m.price.toFixed(2)+'</span>'+btnHtml+'</div></div>';
    }).join('');
    document.getElementById('publicMenuBody').innerHTML='<div class="public-menu-cats">'+catHtml+'</div><div>'+itemsHtml+'</div>';
    updatePublicCartFab();
}
function publicCartInc(id){
    if(!publicCart[id])publicCart[id]=0;
    publicCart[id]++;
    renderPublicMenu(document.querySelector('.public-menu-cats .cat-btn.active')?.textContent.toLowerCase());
}
function publicCartDec(id){
    if(publicCart[id])publicCart[id]--;
    if(publicCart[id]<=0)delete publicCart[id];
    renderPublicMenu(document.querySelector('.public-menu-cats .cat-btn.active')?.textContent.toLowerCase());
}
function updatePublicCartFab(){
    var total=Object.keys(publicCart).reduce(function(s,id){return s+publicCart[id]},0);
    var fab=document.getElementById('publicCartFab');
    var count=document.getElementById('publicCartCount');
    if(total>0){fab.style.display='block';count.textContent=total}else{fab.style.display='none'}
}
function showPublicCart(){
    var items=Object.keys(publicCart).filter(function(id){return publicCart[id]>0});
    if(!items.length)return;
    var h='<div class="modal-title" style="text-align:center"><i class="fas fa-shopping-cart" style="color:var(--green)"></i> Mi Pedido</div><div class="public-menu-cart-modal">';
    var total=0;
    items.forEach(function(id){
        var m=DB.menu.find(function(x){return x.id===parseInt(id)});
        if(!m)return;
        var sub=m.price*publicCart[id];
        total+=sub;
        h+='<div class="cart-item"><div><div class="cart-item-name">'+m.name+'</div><div class="cart-item-qty">x'+publicCart[id]+'</div></div><div class="cart-item-price">S/ '+sub.toFixed(2)+'</div></div>';
    });
    h+='</div><div style="display:flex;justify-content:space-between;font-size:1.2rem;font-weight:800;padding:16px 0;border-top:2px solid var(--green);margin-top:10px"><span>TOTAL</span><span style="color:var(--green)">S/ '+total.toFixed(2)+'</span></div>';
    h+='<p style="font-size:.8rem;color:var(--text-muted);text-align:center;margin-top:16px"><i class="fas fa-info-circle" style="color:var(--cyan)"></i> Muestre este resumen al mozo para tomar su pedido.</p>';
    h+='<button class="btn" style="width:100%;margin-top:12px;padding:12px;background:var(--bg-hover);color:var(--text)" onclick="closeModal()">Cerrar</button>';
    openModal(h);
}
updateLoginUI();
// Detectar modo carta digital publica (?mesa=ID)
try{
    var mesaParam=(window.location.search.match(/[?&]mesa=(\d+)/)||[])[1];
    if(mesaParam){initPublicMenu(parseInt(mesaParam))}
}catch(e){}
// Restaurar sesion (solo si no estamos en modo publico)
if(!window._publicMesaId){
    try{var sess=sessionStorage.getItem('villaMocheSession');if(sess){var s=JSON.parse(sess);var u=DB.users.find(function(x){return x.id===s.userId});if(u){currentUser=u;completeLogin()}}}catch(e){}
}
</script>
