<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villa Moche - ERP/POS Corporativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root{--bg-dark:#F7F6F2;--bg-card:#FFFFFF;--bg-hover:rgba(122,74,32,0.08);--text:#2B2B2B;--text-muted:#8B8B8B;--green:#6DAE4A;--amber:#E6B325;--red:#D64545;--blue:#5D8AA8;--purple:#8B6914;--cyan:#A8D48A;--pink:#C4846A;--radius:12px;--bg-primary:#7A4A20;--bg-secondary:#5E3615;--bg-elevated:#FFFFFF;--green-dim:rgba(109,174,74,.15);--amber-dim:rgba(230,179,37,.12);--red-dim:rgba(214,69,69,.12);--blue-dim:rgba(93,138,168,.12);--purple-dim:rgba(139,105,20,.12);--cyan-dim:rgba(168,212,138,.12);--pink-dim:rgba(196,132,106,.12);--radius-sm:6px;--radius-md:10px;--radius-lg:16px;--shadow-card:0 4px 24px rgba(122,74,32,0.08);--shadow-glow:0 0 30px rgba(109,174,74,.12);--border-subtle:#EAE7E2;--transition:.3s cubic-bezier(.4,0,.2,1);--gradient-green:linear-gradient(135deg,#6DAE4A,#A8D48A);--gradient-amber:linear-gradient(135deg,#E6B325,#7A4A20);--gradient-red:linear-gradient(135deg,#D64545,#C4846A);--glass-bg:rgba(255,255,255,.85);--shadow-elevated:0 8px 32px rgba(122,74,32,0.1);--shadow-glow-green:0 0 20px rgba(109,174,74,.2);--shadow-glow-amber:0 0 20px rgba(230,179,37,.2);--shadow-glow-red:0 0 20px rgba(214,69,69,.2);--glass-border:#EAE7E2;--glass-shine:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%);--bounce:cubic-bezier(.68,-.55,.265,1.55);--brown:#7A4A20;--brown-light:#8B5E3C;--brown-dark:#5E3615;--green-light:#A8D48A;--green-dark:#5A9A3D;--cream:#F7F6F2;--white-soft:#F7F6F2}.light{--bg-dark:#EAE7E2;--bg-card:#FFFFFF;--bg-hover:#E9ECEF;--text:#2B2B2B;--text-muted:#8B8B8B;--shadow-card:0 4px 24px rgba(122,74,32,0.06);--border-subtle:#D8D2C8;--glass-bg:rgba(255,255,255,.92);--shadow-elevated:0 8px 32px rgba(122,74,32,0.08);--glass-border:#D8D2C8}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Inter',sans-serif}
        h1,h2,h3,h4,h5,h6,.playfair,.logo-text{font-family:'Playfair Display',Georgia,serif}
        body{background:var(--bg-dark);color:var(--text);height:100vh;overflow:hidden}
        .login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(160deg,#5E3615 0%,#7A4A20 40%,#6DAE4A 100%);flex-direction:column}
        .login-box{background:var(--bg-card);padding:40px;border-radius:16px;width:450px;box-shadow:0 20px 50px rgba(122,74,32,.2);text-align:center}
        .login-box h1{color:#5E3615;margin-bottom:10px;font-size:1.8rem;font-family:'Playfair Display',Georgia,serif}
        .login-box p.sub{color:#8B8B8B;font-size:.9rem;margin-bottom:25px}
        .login-section{margin-bottom:20px;text-align:left}
        .login-section-title{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;border-bottom:1px solid var(--bg-hover);padding-bottom:5px}
        .login-select{width:100%;padding:12px;background:var(--bg-dark);border:1px solid var(--bg-hover);border-radius:8px;color:var(--text);font-size:.9rem;margin-bottom:8px;cursor:pointer;appearance:none}
        .user-btn{width:100%;padding:12px;border:1px solid var(--bg-hover);background:transparent;color:var(--text);border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:5px}
        .user-btn:hover{border-color:var(--green);background:rgba(16,185,129,.1)}
        .app{display:none;height:100vh}.app.active{display:flex}
        .sidebar{width:260px;background:linear-gradient(180deg,#5E3615,#7A4A20);border-right:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column}
        .sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
        .sidebar-header h2{font-size:1.1rem;color:#FFFFFF;font-family:'Playfair Display',Georgia,serif}
        .sidebar-header small{color:rgba(255,255,255,.7);text-transform:uppercase;font-size:.7rem;letter-spacing:1px;display:block;margin-top:5px}
        .sidebar-menu{flex:1;padding:15px 0;overflow-y:auto}
        .menu-item{padding:12px 20px;color:rgba(255,255,255,.7);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px;font-size:.9rem}
        .menu-item:hover,.menu-item.active{background:rgba(255,255,255,.08);color:#FFFFFF;border-left:3px solid #6DAE4A}
        .sidebar-footer{padding:15px;border-top:1px solid rgba(255,255,255,.05)}
        .btn-logout{width:100%;padding:10px;background:rgba(239,68,68,.1);color:var(--red);border:none;border-radius:8px;cursor:pointer;font-weight:600}
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .topbar{height:60px;background:rgba(255,255,255,.95);border-bottom:1px solid #EAE7E2;display:flex;align-items:center;justify-content:space-between;padding:0 25px;flex-shrink:0}
        .topbar h1{font-size:1.1rem}
        .topbar-info{display:flex;gap:15px;align-items:center}
        .badge{background:var(--bg-dark);padding:5px 10px;border-radius:6px;font-size:.8rem;color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
        .content{flex:1;padding:25px;overflow-y:auto;background-image:radial-gradient(ellipse at top left,rgba(109,174,74,.03) 0%,transparent 50%),radial-gradient(ellipse at bottom right,rgba(122,74,32,.03) 0%,transparent 50%)}
        .view{display:none}.view.active{display:block;animation:fadeIn .3s}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .grid{display:grid;gap:20px}.grid-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}.grid-4{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
        .card{background:var(--bg-card);padding:20px;border-radius:var(--radius);border:1px solid rgba(255,255,255,.05)}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .card-title{font-weight:700;font-size:1rem}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.2s}
        .btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.9}
        .btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.9}
        .btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{opacity:.85}
        .btn-cyan{background:var(--cyan);color:#fff}.btn-cyan:hover{opacity:.85}
        .btn-amber{background:var(--amber);color:#000}.btn-amber:hover{opacity:.85}
        .btn-sm{padding:5px 10px;font-size:.75rem}.btn-xs{padding:3px 8px;font-size:.7rem;border-radius:4px}
        .btn-icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm)}
        .btn-outline{background:transparent;border:1px solid var(--border-subtle);color:var(--text-muted)}.btn-outline:hover{border-color:var(--text-muted);color:var(--text)}
        .btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{background:#7c3aed}
        .btn-pink{background:var(--pink);color:#fff}.btn-pink:hover{background:#db2777}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;font-size:.8rem;color:var(--text-muted);margin-bottom:5px}
        .form-control{width:100%;padding:10px 12px;background:var(--bg-dark);border:1px solid var(--bg-hover);border-radius:8px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s}
        .form-control:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
        select.form-control{-webkit-appearance:none;appearance:none;background-image:url(\"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 12 12%27%3E%3Cpath fill=%27%2394a3b8%27 d=%27M6 8L1 3h10z%27/%3E%3C/svg%3E\");background-repeat:no-repeat;background-position:right 10px center;padding-right:30px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        .mesa{padding:20px;border-radius:var(--radius);text-align:center;cursor:pointer;border:2px solid transparent;transition:.3s}
        .mesa:hover{transform:translateY(-3px)}
        .mesa.libre{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3)}
        .mesa.ocupada{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3)}
        .mesa.reservada{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.3)}
        .mesa.cocina{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3)}
        .mesa.listo{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3)}
        .mesa h3{font-size:1.5rem;margin-bottom:5px}
        .mesa p{font-size:.8rem;text-transform:uppercase;font-weight:700}
        .mesa .mozo-asignado{font-size:.7rem;margin-top:5px;color:var(--text-muted);font-weight:400}
        .mesa .comanda-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,.2);color:var(--amber);padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700;margin-top:4px;border:1px solid rgba(245,158,11,.3)}
        .admin-input{background:transparent;border:1px solid var(--bg-hover);color:var(--text);text-align:center;font-size:.95rem;font-weight:700;padding:5px;border-radius:6px;outline:none}
        .admin-input:focus{border-color:var(--cyan)}
        .area-header{font-size:1.1rem;color:var(--cyan);display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid rgba(6,182,212,.2)}
        .kitchen-card{border-left:4px solid var(--amber);margin-bottom:15px}
        .kitchen-card.late{border-left-color:var(--red);background:rgba(239,68,68,.05)!important}
        .timer{font-size:1.5rem;font-weight:800;font-family:monospace}
        .timer.late{color:var(--red);animation:pulse 1s infinite}
        @keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center}
        .modal-overlay.active{display:flex}
        .modal{background:var(--bg-card);width:92%;max-width:700px;max-height:90vh;overflow-y:auto;border-radius:16px;padding:25px;border:1px solid var(--bg-hover)}
        .modal-title{font-size:1.2rem;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--bg-hover)}
        .toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px}
        .toast{padding:15px 20px;border-radius:8px;color:#fff;font-size:.9rem;animation:slideIn .3s;display:flex;align-items:center;gap:10px;box-shadow:0 10px 20px rgba(0,0,0,.3)}
        .toast.success{background:var(--green)}.toast.warning{background:var(--amber);color:#000}.toast.error{background:var(--red)}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes shrink{from{width:100%}to{width:0%}}
        .stock-alert{font-size:.7rem;color:var(--red);font-weight:700;background:rgba(239,68,68,.1);padding:2px 6px;border-radius:4px;margin-left:5px}
        .receipt-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.1);font-size:.9rem}
        .receipt-total{display:flex;justify-content:space-between;padding:15px 0 0;font-size:1.2rem;font-weight:800;color:var(--green)}
        .list-item{display:flex;justify-content:space-between;align-items:center;background:var(--bg-dark);padding:12px;border-radius:8px;margin-bottom:8px}
        .kpi-card{background:var(--bg-card);padding:20px;border-radius:var(--radius);border-left:4px solid var(--green);display:flex;flex-direction:column;justify-content:center}
        .kpi-card.amber{border-left-color:var(--amber)}.kpi-card.blue{border-left-color:var(--blue)}.kpi-card.purple{border-left-color:var(--purple)}.kpi-card.red{border-left-color:var(--red)}
        .kpi-card h4{color:var(--text-muted);font-size:.8rem;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
        .kpi-card p{font-size:1.5rem;font-weight:800}
        .filter-btn{padding:8px 15px;background:transparent;border:1px solid var(--bg-hover);color:var(--text-muted);border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.2s}
        .filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
        .rank-bar-bg{background:var(--bg-dark);height:8px;border-radius:4px;margin-top:5px;overflow:hidden}
        .rank-bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}
        .table-scroll{max-height:400px;overflow-y:auto}
        .warning-box{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);padding:15px;border-radius:8px;color:var(--amber);font-size:.9rem}
        .bulk-preview{margin-top:12px;padding:12px 15px;background:var(--bg-dark);border-radius:8px;border:1px solid rgba(6,182,212,.15);font-size:.82rem;color:var(--cyan);line-height:1.6}
        .bulk-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(16,185,129,.12);color:var(--green);padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;border:1px solid rgba(16,185,129,.2)}
        .recipe-card{border-left:4px solid var(--green)}.recipe-card.limit-red{border-left-color:var(--red)}.recipe-card.limit-amber{border-left-color:var(--amber)}
        .ing-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:.85rem}
        .ing-row.limiting{background:rgba(239,68,68,.07)}
        .ing-bar-bg{flex:1;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden}
        .ing-bar-fill{height:100%;border-radius:3px;transition:width .3s}
        .sim-panel{margin-top:15px;padding:15px;background:var(--bg-dark);border-radius:10px;border:1px solid rgba(6,182,212,.2);animation:fadeIn .2s}
        .sim-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:.83rem;border-bottom:1px solid rgba(255,255,255,.03)}.sim-row:last-child{border-bottom:none}
        .sim-arrow{color:var(--text-muted);font-size:.7rem}
        .sim-result{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);padding:10px 15px;border-radius:8px;margin-top:12px}
        .sim-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);padding:10px 15px;border-radius:8px;margin-bottom:12px;color:var(--red);font-size:.85rem}
        .sim-ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);padding:10px 15px;border-radius:8px;margin-top:12px;color:var(--green);font-size:.85rem;text-align:center}
        .rec-ing-edit-row{display:flex;align-items:center;gap:10px;background:var(--bg-dark);padding:10px 12px;border-radius:8px;margin-bottom:8px}
        .rec-ing-edit-row .ing-name{flex:1;font-weight:600;font-size:.9rem}
        .rec-ing-edit-row .ing-unit{font-size:.75rem;color:var(--text-muted);width:30px;text-align:center}
        .rec-ing-edit-row .ing-qty-input{width:90px;text-align:center;font-weight:700}
        .rec-add-section{background:rgba(6,182,212,.04);border:2px dashed rgba(6,182,212,.2);border-radius:12px;padding:18px;margin-top:20px}
        .rec-add-section .section-title{font-weight:700;font-size:.85rem;color:var(--cyan);margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .rec-ing-stock-tag{font-size:.65rem;padding:2px 6px;border-radius:4px;margin-left:6px}
        .rec-ing-stock-ok{background:rgba(16,185,129,.1);color:var(--green)}
        .rec-ing-stock-low{background:rgba(239,68,68,.1);color:var(--red)}
        .recipe-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
        .recipe-badge.has{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
        .recipe-badge.empty{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.15)}
        .danger-zone{border:2px solid rgba(239,68,68,.2);background:rgba(239,68,68,.03);border-radius:12px;padding:20px;margin-top:25px}
        .danger-zone-header{display:flex;align-items:center;gap:10px;margin-bottom:15px;color:var(--red);font-weight:800;font-size:.95rem;text-transform:uppercase;letter-spacing:.5px}
        .pw-input{font-family:monospace;font-size:1.1rem;letter-spacing:3px;text-align:center;font-weight:700}
        .pw-input.wrong{border-color:var(--red);animation:shake .4s}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        .unit-change-preview{background:var(--bg-dark);border-radius:8px;padding:12px;margin:12px 0}
        .unit-change-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
        .unit-arrow{color:var(--cyan);font-size:.8rem}
        .bulk-dish-section{background:var(--bg-dark);border-radius:12px;padding:18px;margin-bottom:14px;border:1px solid rgba(6,182,212,.12);transition:border-color .2s}
        .bulk-dish-section:hover{border-color:rgba(6,182,212,.3)}
        .bulk-dish-section.has-recipe{border-left:4px solid var(--green);background:rgba(16,185,129,.03)}
        .bulk-dish-section.no-recipe{border-left:4px dashed rgba(239,68,68,.25)}
        .bulk-dish-title{font-weight:800;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .bulk-dish-title .dish-price{color:var(--text-muted);font-size:.82rem;font-weight:400}
        .bulk-ing-row{display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(255,255,255,.025);border-radius:8px;margin-bottom:6px;font-size:.83rem;border:1px solid rgba(255,255,255,.03)}
        .bulk-ing-row .ing-n{flex:1;font-weight:600;font-size:.85rem}
        .bulk-ing-row .ing-u{color:var(--text-muted);font-size:.72rem;width:30px;text-align:center}
        .bulk-ing-row .ing-q{color:var(--green);font-weight:800;font-size:.88rem;width:85px;text-align:right}
        .bulk-ing-row .ing-per{color:var(--text-muted);font-size:.68rem;width:45px;text-align:right}
        .bulk-summary{background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.15);border-radius:10px;padding:15px;margin-top:18px;margin-bottom:5px}
        .bulk-summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.03)}
        .bulk-summary-row:last-child{border-bottom:none}
        .comanda-section{background:rgba(255,255,255,.03);border-radius:10px;padding:12px 15px;margin-bottom:10px;border-left:3px solid var(--text-muted)}
        .comanda-section.comanda-prev{border-left-color:var(--text-muted);opacity:.7}
        .comanda-section.comanda-new{border-left-color:var(--amber);background:rgba(245,158,11,.05);animation:fadeIn .3s}
        .comanda-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .comanda-label.prev{color:var(--text-muted)}
        .comanda-label.new{color:var(--amber)}
        /* ===== IMPRESORAS ===== */
        .printer-card{background:var(--bg-card);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.05);transition:all .25s;position:relative}
        .printer-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-card)}
        .printer-card.inactive{opacity:.55;border-style:dashed}
        .printer-card .pc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
        .printer-card .pc-name{font-weight:800;font-size:1.05rem}
        .printer-card .pc-model{font-size:.75rem;color:var(--text-muted)}
        .printer-card .pc-status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
        .printer-card .pc-status-dot.on{background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.4)}
        .printer-card .pc-status-dot.off{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,.3)}
        .printer-card .pc-detail-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.82rem;border-bottom:1px solid rgba(255,255,255,.04)}
        .printer-card .pc-detail-row:last-child{border-bottom:none}

/* ===== KITCHEN DISH-LEVEL TIMERS ===== */
.kitchen-dish-item{padding:10px 12px;border-radius:8px;margin-bottom:6px;background:var(--bg-dark);border-left:3px solid var(--green);transition:all .3s}
.kitchen-dish-item.timer-warning{border-left-color:var(--amber);background:rgba(245,158,11,.06)}
.kitchen-dish-item.timer-danger{border-left-color:var(--red);background:rgba(239,68,68,.08);animation:dishFlash .6s infinite}
.kitchen-dish-item.timer-done{border-left-color:var(--text-muted);opacity:.5}
.kitchen-dish-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.kitchen-dish-name{font-weight:700;font-size:.9rem}
.kitchen-dish-timer{font-family:monospace;font-weight:800;font-size:.95rem;white-space:nowrap}
.kitchen-dish-timer.ok{color:var(--green)}
.kitchen-dish-timer.warn{color:var(--amber)}
.kitchen-dish-timer.over{color:var(--red)}
.kitchen-dish-progress{height:4px;background:var(--bg-hover);border-radius:2px;overflow:hidden;margin-top:6px}
.kitchen-dish-progress-fill{height:100%;border-radius:2px;transition:width 1s linear}
.kitchen-dish-progress-fill.ok{background:var(--green)}
.kitchen-dish-progress-fill.warn{background:var(--amber)}
.kitchen-dish-progress-fill.over{background:var(--red);animation:progressPulse .6s infinite}
@keyframes dishFlash{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes progressPulse{0%,100%{opacity:1}50%{opacity:.4}}
.kitchen-urgent-banner{background:linear-gradient(90deg,rgba(239,68,68,.2),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;margin-bottom:15px;display:flex;align-items:center;gap:10px;animation:dishFlash 1s infinite}
.kitchen-urgent-banner i{color:var(--red);font-size:1.1rem}
.kitchen-urgent-banner span{font-size:.82rem;font-weight:700;color:var(--red)}
/* ===== SOUND CONFIG ===== */
.sound-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg-dark);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--cyan)}
.sound-row .sound-name{flex:1;font-weight:600;font-size:.85rem}
.sound-row .sound-actions{display:flex;gap:6px;align-items:center}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-60px) rotate(720deg);opacity:0}}
.skeleton{background:linear-gradient(90deg,var(--bg-hover) 25%,var(--bg-card) 50%,var(--bg-hover) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
.glass{background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border-subtle)}
.highlight-card{border-left:4px solid var(--green);background:var(--bg-card)}.highlight-card.amber{border-left-color:var(--amber)}.highlight-card.blue{border-left-color:var(--blue)}.highlight-card.purple{border-left-color:var(--purple)}.highlight-card.red{border-left-color:var(--red)}.highlight-card.cyan{border-left-color:var(--cyan)}
.kpi-card .kpi-value{font-size:1.6rem;font-weight:800;line-height:1.1}.kpi-card .kpi-sub{font-size:.75rem;color:var(--text-muted);margin-top:4px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.area-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.area-tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-muted);cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s}
.area-tab:hover{border-color:var(--text-muted)}.area-tab.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:12px 0}.cal-day{padding:10px;text-align:center;border-radius:var(--radius-sm);font-size:.82rem;cursor:pointer;transition:all .15s;background:var(--bg-dark)}.cal-day:hover{background:var(--bg-hover)}.cal-day.today{border:2px solid var(--green);font-weight:700}.cal-day.has-event{background:var(--green-dim);color:var(--green);font-weight:700}.cal-day.other-month{opacity:.3}.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qr-display{padding:16px;background:#fff;border-radius:var(--radius-md);display:inline-block}
.payment-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin:14px 0}
.pay-btn{padding:12px 8px;border:2px solid var(--border-subtle);border-radius:var(--radius-md);background:var(--bg-dark);color:var(--text-muted);cursor:pointer;text-align:center;transition:all .2s;font-size:.72rem;font-weight:600}.pay-btn:hover{border-color:var(--text-muted)}.pay-btn.active{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.pay-btn .pay-icon{display:block;font-size:1.3rem;margin-bottom:4px}
.closure-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-subtle);font-size:.9rem}
.success-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);padding:14px 16px;border-radius:var(--radius-md);color:var(--green);font-size:.88rem}
.table-wrap{overflow-x:auto;border-radius:var(--radius-md);border:1px solid var(--border-subtle);margin:10px 0}

function playSound(t){try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);g.gain.value=.15;if(t==='success'||t==='check'){o.frequency.value=880;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);o.stop(ctx.currentTime+.2)}else if(t==='error'||t==='alert'){o.frequency.value=300;o.type='sawtooth';o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);o.stop(ctx.currentTime+.25);var o2=ctx.createOscillator();o2.frequency.value=200;o2.type='sawtooth';o2.connect(ctx.destination);o2.start();o2.stop(ctx.currentTime+.25)}else if(t==='warning'){o.frequency.value=600;o.type='square';o.start();setTimeout(function(){o.frequency.value=800},100);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);o.stop(ctx.currentTime+.3)}else if(t==='order'){o.frequency.value=660;o.type='sine';o.start();setTimeout(function(){var o2=ctx.createOscillator();o2.frequency.value=880;o2.type='sine';o2.connect(ctx.destination);o2.start();o2.stop(ctx.currentTime+.15)},100);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);o.stop(ctx.currentTime+.3)}else if(t==='click'){o.frequency.value=1000;o.type='sine';g.gain.value=.08;o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.05);o.stop(ctx.currentTime+.05)}else{o.frequency.value=800;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.15);o.stop(ctx.currentTime+.15)}}catch(e){}}
function playBeep(f,d){try{if(f||d){var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f||800;o.type='sine';g.gain.value=0.15;o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(d||0.15));o.stop(ctx.currentTime+(d||0.15))}else playSound('beep')}catch(e){}}

function openIngredientCalculator(){var hasRecipes=DB.recipes.some(function(r){return r.ingredients&&r.ingredients.length});if(!hasRecipes){openModal('<div class="modal-title"><i class="fas fa-calculator" style="color:var(--cyan);margin-right:8px"></i> Generador de Insumos</div><div class="empty-illustration"><i class="fas fa-robot"></i><h3>No hay recetas configuradas</h3><p style="color:var(--text-muted);font-size:.85rem">Primero agregue recetas a los platos desde Inventario > Recetas</p></div>');return}var catOpts=['comida','bebidas','postres','chicha','helados','golosinas'].map(function(c){return'<option value="'+c+'">'+getMenuCategoryName(c)+'</option>'}).join('');var dishesHtml='';DB.menu.forEach(function(m){var r=DB.recipes.find(function(x){return x.menuId===m.id});var has=r&&r.ingredients&&r.ingredients.length;if(has)dishesHtml+='<div class="bulk-dish-section has-recipe" id="gidish-'+m.id+'"><div class="form-row" style="align-items:center"><div class="form-group" style="margin:0;flex:1"><label>'+m.name+' <span style="color:var(--text-muted);font-weight:400">S/'+m.price.toFixed(2)+'</span></label><div style="display:flex;gap:8px;align-items:center;margin-top:5px"><input type="number" class="form-control" id="gi-qty-'+m.id+'" value="0" min="0" style="width:100px" onchange="updateGIPreview()" oninput="updateGIPreview()"><span style="font-size:.78rem;color:var(--text-muted)">platos</span></div></div><div class="form-group" style="margin:0;width:120px;text-align:right"><label>Stock: <span style="color:'+(m.stock>0?'var(--green)':'var(--red)')+'">'+m.stock+'</span></label></div></div><div id="gi-preview-'+m.id+'" style="display:none;margin-top:8px"></div></div>'});var h='<div class="modal-title"><i class="fas fa-calculator" style="color:var(--cyan);margin-right:8px"></i> Generador Automático de Insumos</div><div style="margin-bottom:12px"><div class="form-row"><div class="form-group"><label>Categoria</label><select class="form-control" onchange="filterGIDishes()" id="gi-cat-filter"><option value="todas">Todas las categorias</option>'+catOpts+'</select></div><div class="form-group" style="display:flex;align-items:flex-end;gap:6px"><button class="btn btn-blue btn-sm" onclick="setAllGIQty(10)">x10</button><button class="btn btn-blue btn-sm" onclick="setAllGIQty(50)">x50</button><button class="btn btn-amber btn-sm" onclick="setAllGIQty(0)">Limpiar</button></div></div></div><div id="gi-dishes-list">'+dishesHtml+'</div><div id="gi-results" style="display:none"></div><div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn-green btn-lg" style="flex:1" onclick="calculateGI()"><i class="fas fa-calculator"></i> Calcular Insumos</button><button class="btn btn-outline btn-lg" onclick="closeModal()">Cancelar</button></div>';openModal(h)}
function filterGIDishes(){var cat=document.getElementById('gi-cat-filter').value;document.querySelectorAll('[id^="gidish-"]').forEach(function(el){var id=parseInt(el.id.replace('gidish-',''));var m=DB.menu.find(function(x){return x.id===id});el.style.display=(cat==='todas'||(m&&m.category===cat))?'block':'none'})}
function setAllGIQty(qty){document.querySelectorAll('[id^="gi-qty-"]').forEach(function(el){el.value=qty;updateGIPreview()});if(qty>0)showToast('Cantidad '+qty+' aplicada a todos','info')}
function updateGIPreview(){document.querySelectorAll('[id^="gi-qty-"]').forEach(function(el){var id=parseInt(el.id.replace('gi-qty-',''));var qty=parseInt(el.value)||0;var pre=document.getElementById('gi-preview-'+id);if(!pre)return;var m=DB.menu.find(function(x){return x.id===id});if(!m||qty<1){pre.style.display='none';return}var r=DB.recipes.find(function(x){return x.menuId===id});if(!r||!r.ingredients||!r.ingredients.length){pre.style.display='none';return}var html='<div style="background:rgba(16,185,129,.04);border-radius:8px;padding:10px">';r.ingredients.forEach(function(ing){var inv=DB.inventory.find(function(x){return x.id===ing.inventoryId});if(!inv)return;var totalQty=ing.qty*qty;var enough=inv.stock>=totalQty;html+='<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:.8rem"><span style="flex:1;font-weight:600">'+inv.name+'</span><span style="color:var(--text-muted)">'+totalQty+' '+inv.unit+'</span><span style="color:'+(enough?'var(--green)':'var(--red)')+';font-size:.7rem">'+inv.stock+' disp.</span></div>'});html+='</div>';pre.innerHTML=html;pre.style.display='block'})}
function calculateGI(){var items=[];document.querySelectorAll('[id^="gi-qty-"]').forEach(function(el){var id=parseInt(el.id.replace('gi-qty-',''));var qty=parseInt(el.value)||0;if(qty<1)return;var m=DB.menu.find(function(x){return x.id===id});if(!m)return;var r=DB.recipes.find(function(x){return x.menuId===id});if(!r||!r.ingredients||!r.ingredients.length)return;items.push({menu:m,recipe:r,qty:qty})});if(!items.length){showToast('Seleccione al menos un plato con cantidad','warning');return}var totals={};var costTotal=0;var html='<div class="bulk-summary"><h4 style="margin-bottom:12px;display:flex;align-items:center;gap:8px"><i class="fas fa-clipboard-list" style="color:var(--cyan)"></i> Resultado del Calculo</h4>';items.forEach(function(item){html+='<div class="bulk-dish-section has-recipe" style="margin-bottom:8px"><div class="bulk-dish-title">'+item.menu.name+' <span style="font-weight:400;color:var(--text-muted);font-size:.85rem">x'+item.qty+'</span></div>';item.recipe.ingredients.forEach(function(ing){var inv=DB.inventory.find(function(x){return x.id===ing.inventoryId});if(!inv)return;var totalQty=smartRound(ing.qty*item.qty);var key=inv.id;if(!totals[key])totals[key]={name:inv.name,unit:inv.unit,qty:0,cost:inv.costPrice||0};totals[key].qty+=totalQty;var enough=inv.stock>=totals[key].qty;html+='<div class="bulk-ing-row"><span class="ing-n">'+inv.name+'</span><span class="ing-u">'+inv.unit+'</span><span class="ing-q">'+totalQty+'</span><span class="ing-per" style="color:'+(enough?'var(--green)':'var(--red)')+'">'+inv.stock+' disp.</span></div>'});html+='</div>'});html+='<div class="divider-gradient"></div><h4 style="margin-bottom:10px">Total de Insumos Requeridos</h4>';var hasShortage=false;Object.keys(totals).forEach(function(key){var t=totals[key];var enough=DB.inventory.find(function(x){return x.id===parseInt(key)})&&DB.inventory.find(function(x){return x.id===parseInt(key)}).stock>=t.qty;if(!enough)hasShortage=true;t.cost=t.cost||0;var costLine=t.cost>0?'S/'+smartRound(t.qty*t.cost).toFixed(2):'';html+='<div class="bulk-summary-row"><span style="font-weight:600">'+t.name+'</span><span>'+smartRound(t.qty)+' '+t.unit+' <span style="color:'+(enough?'var(--green)':'var(--red)')+'">('+t.qty+' req.)</span></span></div>'});if(hasShortage)html+='<div class="sim-error"><i class="fas fa-exclamation-triangle"></i> Algunos insumos tienen stock insuficiente</div>';html+='</div><div style="display:flex;gap:10px;margin-top:15px"><button class="btn btn-green" onclick="downloadGIPDF()"><i class="fas fa-file-pdf"></i> Descargar PDF</button><button class="btn btn-blue" onclick="downloadGICSV()"><i class="fas fa-file-excel"></i> Descargar CSV</button><button class="btn btn-cyan" onclick="printGIResults()"><i class="fas fa-print"></i> Imprimir</button></div>';document.getElementById('gi-results').innerHTML=html;document.getElementById('gi-results').style.display='block';document.getElementById('gi-results').scrollIntoView({behavior:'smooth',block:'start'});addNotif('calculator','var(--green)','Calculo de insumos generado para '+items.length+' plato(s)');showToast('Calculo generado para '+items.length+' plato(s)','success')}

function calcularNecesidadProduccion(){
    var inputs=document.querySelectorAll('.np-qty');
    var items=[];
    var hasAny=false;
    inputs.forEach(function(inp){
        var qty=parseInt(inp.value)||0;
        if(qty<1)return;
        hasAny=true;
        var menuId=parseInt(inp.getAttribute('data-menuid'));
        var m=DB.menu.find(function(x){return x.id===menuId});
        var r=DB.recipes.find(function(x){return x.menuId===menuId});
        if(m&&r)items.push({menu:m,recipe:r,qty:qty});
    });
    if(!hasAny||!items.length){showToast('Ingrese cantidad para al menos un plato','warning');return}
    var totals={};
    var costTotal=0;
    var html='<div id="np-results"><div class="bulk-summary" style="margin:0"><h4 style="margin-bottom:15px;display:flex;align-items:center;gap:10px"><i class="fas fa-clipboard-list" style="color:var(--cyan)"></i> Resultado del Calculo</h4>';
    items.forEach(function(item){
        html+='<div class="bulk-dish-section has-recipe" style="margin-bottom:10px"><div class="bulk-dish-title">'+item.menu.name+' <span style="font-weight:400;color:var(--text-muted);font-size:.85rem">x'+item.qty+' platos</span> <span style="font-weight:400;color:var(--text-muted);font-size:.78rem">S/ '+(item.menu.price*item.qty).toFixed(2)+'</span></div>';
        item.recipe.ingredients.forEach(function(ing){
            var inv=DB.inventory.find(function(x){return x.id===ing.inventoryId});
            if(!inv)return;
            var totalQty=smartRound(ing.qty*item.qty);
            var key=inv.id;
            if(!totals[key])totals[key]={name:inv.name,unit:inv.unit,qty:0,cost:inv.costPrice||0};
            totals[key].qty+=totalQty;
            var enough=inv.stock>=totals[key].qty;
            html+='<div class="bulk-ing-row"><span class="ing-n">'+inv.name+'</span><span class="ing-u">'+inv.unit+'</span><span class="ing-q" style="color:'+(enough?'var(--green)':'var(--red)')+'">'+totalQty+'</span><span class="ing-per" style="color:'+(enough?'var(--green)':'var(--red)')+';width:auto">Stock: '+smartRound(inv.stock)+'</span></div>';
        });
        html+='</div>';
    });
    html+='<div class="divider-gradient"></div><h4 style="margin-bottom:12px">Resumen Total de Insumos</h4>';
    html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.82rem">';
    html+='<thead><tr style="background:var(--bg-hover)"><th style="padding:8px;text-align:left">Insumo</th><th style="padding:8px;text-align:center">Und</th><th style="padding:8px;text-align:center">Necesario</th><th style="padding:8px;text-align:center">Stock</th><th style="padding:8px;text-align:center">Faltante</th><th style="padding:8px;text-align:center">Costo</th></tr></thead><tbody>';
    var hasShortage=false;
    Object.keys(totals).sort(function(a,b){return totals[a].name.localeCompare(totals[b].name)}).forEach(function(key){
        var t=totals[key];
        var stock=0;
        var invItem=DB.inventory.find(function(x){return x.id===parseInt(key)});
        if(invItem)stock=invItem.stock;
        var factor=1,displayUnit=t.unit;
        if(t.unit==='g'){factor=0.001;displayUnit='kg'}
        else if(t.unit==='ml'){factor=0.001;displayUnit='l'}
        var qtyDisp=smartRound(t.qty*factor);
        var stockDisp=smartRound(stock*factor);
        var realFaltante=Math.max(0,t.qty-stock);
        var faltanteDisp=smartRound(realFaltante*factor);
        if(realFaltante>0)hasShortage=true;
        t.cost=t.cost||0;
        var costLine=t.cost>0?'S/ '+smartRound(t.qty*t.cost).toFixed(2):'-';
        var rowColor=realFaltante>0?'rgba(239,68,68,.06)':'transparent';
        html+='<tr style="background:'+rowColor+';border-bottom:1px solid var(--bg-hover)"><td style="padding:6px 8px;font-weight:600">'+t.name+'</td><td style="padding:6px 8px;text-align:center;color:var(--text-muted);font-weight:700">'+displayUnit+'</td><td style="padding:6px 8px;text-align:center;font-weight:700">'+qtyDisp+'</td><td style="padding:6px 8px;text-align:center;color:'+(stock>=t.qty?'var(--green)':'var(--red)')+'">'+stockDisp+'</td><td style="padding:6px 8px;text-align:center;font-weight:800;color:'+(realFaltante>0?'var(--red)':'var(--green)')+'">'+(realFaltante>0?faltanteDisp:'<span style="color:var(--green)">OK</span>')+'</td><td style="padding:6px 8px;text-align:center;color:var(--text-muted)">'+costLine+'</td></tr>';
    });
    html+='</tbody></table></div>';
    if(hasShortage)html+='<div style="margin-top:12px;padding:12px;background:rgba(239,68,68,.08);border-radius:8px;border:1px solid rgba(239,68,68,.2);color:var(--red);font-size:.85rem"><i class="fas fa-exclamation-triangle"></i> Hay insumos con faltante. Revise la columna <strong>Faltante</strong> para saber que debe comprar.</div>';
    else html+='<div style="margin-top:12px;padding:12px;background:rgba(16,185,129,.08);border-radius:8px;border:1px solid rgba(16,185,129,.2);color:var(--green);font-size:.85rem"><i class="fas fa-check-circle"></i> Stock suficiente para todos los insumos.</div>';
    html+='<div class="pdf-actions" style="margin-top:15px"><button class="btn btn-pdf" onclick="downloadNecesidadPDF()"><i class="fas fa-file-pdf"></i> Descargar PDF Detallado</button><button class="btn btn-pdf-print" onclick="printNecesidad()"><i class="fas fa-print"></i> Imprimir</button></div></div>';
    closeModal();
    openModal('<div class="modal-title" style="color:var(--green)"><i class="fas fa-check-circle" style="margin-right:8px"></i> Necesidad de Produccion</div>'+html);
}

// ===== DESCONTAR INVENTARIO POR RECETAS =====
function validateInventoryForOrder(items){
    if(!items||!items.length)return[];
    var shortages=[];
    var deductions={};
    items.forEach(function(item){
        var r=DB.recipes.find(function(x){return x.menuId===item.menuId});
        if(!r||!r.ingredients||!r.ingredients.length)return;
        r.ingredients.forEach(function(ing){
            var inv=DB.inventory.find(function(x){return x.id===ing.inventoryId});
            if(!inv)return;
            var totalNeeded=ing.qty*item.qty;
            var key=ing.inventoryId;
            if(!deductions[key])deductions[key]=0;
            deductions[key]+=totalNeeded;
        });
    });
    for(var key in deductions){
        var inv=DB.inventory.find(function(x){return x.id===parseInt(key)});
        var needed=deductions[key];
        if(!inv)continue;
        if(inv.stock<needed){
            shortages.push(inv.name+' (faltan '+(needed-inv.stock)+' '+inv.unit+')');
        }
    }
    return shortages;
}
function deductInventoryFromOrder(items){
    if(!items||!items.length)return true;
    var shortages=[];
    var deductions={};
    items.forEach(function(item){
        var r=DB.recipes.find(function(x){return x.menuId===item.menuId});
        if(!r||!r.ingredients||!r.ingredients.length)return;
        r.ingredients.forEach(function(ing){
            var inv=DB.inventory.find(function(x){return x.id===ing.inventoryId});
            if(!inv)return;
            var totalNeeded=ing.qty*item.qty;
            var key=ing.inventoryId;
            if(!deductions[key])deductions[key]=0;
            deductions[key]+=totalNeeded;
        });
    });
    for(var key in deductions){
        var inv=DB.inventory.find(function(x){return x.id===parseInt(key)});
        var needed=deductions[key];
        if(!inv)continue;
        if(inv.stock<needed){
            shortages.push(inv.name+' (faltan '+(needed-inv.stock)+' '+inv.unit+')');
        }
    }
    if(shortages.length){
        showToast('Stock insuficiente en insumos: '+shortages.join(', '),'error');
        return false;
    }
    for(var key in deductions){
        var inv=DB.inventory.find(function(x){return x.id===parseInt(key)});
        var needed=deductions[key];
        if(inv)inv.stock-=needed;
    }
    if(Object.keys(deductions).length)showToast('Inventario actualizado por recetas','success');
    return true;
}
function restoreInventoryFromOrder(items){
    if(!items||!items.length)return;
    var restored=[];
    items.forEach(function(item){
        var r=DB.recipes.find(function(x){return x.menuId===item.menuId});
        if(!r||!r.ingredients||!r.ingredients.length)return;
        r.ingredients.forEach(function(ing){
            var inv=DB.inventory.find(function(x){return x.id===ing.inventoryId});
            if(!inv)return;
            inv.stock+=ing.qty*item.qty;
            if(restored.indexOf(inv.name)===-1)restored.push(inv.name);
        });
    });
    if(restored.length)showToast('Inventario restaurado: '+restored.join(', '),'success');
}

function previewUnitChange(invId){
    var inv=DB.inventory.find(function(i){return i.id===invId});if(!inv)return;
    var sel=document.getElementById('new-unit-sel');if(!sel)return;
    var newUnit=sel.value,factor=getUnitFactor(inv.unit,newUnit),pv=document.getElementById('unit-change-preview');
    if(!factor||newUnit===inv.unit){pv.innerHTML='';return}
    var newStock=smartRound(inv.stock*factor);
    var h='<div class="unit-change-preview"><div style="font-size:.75rem;color:var(--cyan);text-transform:uppercase;margin-bottom:8px">Vista previa del cambio</div><div class="unit-change-row"><span style="flex:1">Stock inventario</span><span style="color:var(--text-muted)">'+inv.stock+' '+inv.unit+'</span><i class="fas fa-arrow-right unit-arrow"></i><span style="font-weight:700;color:var(--green)">'+newStock+' '+newUnit+'</span></div>';
    DB.recipes.forEach(function(r){r.ingredients.forEach(function(ing){if(ing.inventoryId===invId){var dish=DB.menu.find(function(m){return m.id===r.menuId});h+='<div class="unit-change-row"><span style="flex:1;color:var(--text-muted);font-size:.8rem">'+(dish?dish.name:'?')+'</span><span style="color:var(--text-muted);font-size:.85rem">'+ing.qty+' '+inv.unit+'/plato</span><i class="fas fa-arrow-right unit-arrow"></i><span style="font-weight:700;color:var(--green);font-size:.85rem">'+smartRound(ing.qty*factor)+' '+newUnit+'/plato</span></div>'}})});
    h+='</div>';pv.innerHTML=h;
}
function confirmChangeUnit(invId){
    var inv=DB.inventory.find(function(i){return i.id===invId});if(!inv)return;
    var newUnit=document.getElementById('new-unit-sel').value;
    if(newUnit===inv.unit)return showToast('Seleccione una unidad diferente','warning');
    var factor=getUnitFactor(inv.unit,newUnit);
    if(!factor){showToast('Conversion no valida','error');return}
    inv.stock=smartRound(inv.stock*factor);
    DB.recipes.forEach(function(r){r.ingredients.forEach(function(ing){if(ing.inventoryId===invId){ing.qty=smartRound(ing.qty*factor)}})});
    closeModal();showToast(inv.name+': '+inv.unit+' -> '+newUnit+' (Stock: '+inv.stock+')');renderAdminInventario();
}

function login(userId){
    currentUser=DB.users.find(function(u){return u.id===userId});
    if(!currentUser)return;
    if(currentUser.role==='admin'){showAdminLoginPw();return}
    completeLogin()
}

function getSelectedDeleteAreaIds(){
    var ids=[];
    document.querySelectorAll('.delete-area-checkbox:checked').forEach(function(c){ids.push(parseInt(c.value))});
    return ids;
}
function updateDeleteTablesPreview(){
    var pre=document.getElementById('delete-tables-preview');
    if(!pre)return;
    var aIds=getSelectedDeleteAreaIds();
    if(!aIds.length){pre.innerHTML='<div style="text-align:center;padding:10px;color:var(--text-muted)">Seleccione al menos un area</div>';return}
    var tables=[];
    aIds.forEach(function(id){tables=tables.concat(DB.tables.filter(function(t){return t.areaId===id}))});
    var free=tables.filter(function(t){return t.status==='libre'});
    var busy=tables.filter(function(t){return t.status!=='libre'});
    var areaNames=aIds.map(function(id){var a=DB.areas.find(function(x){return x.id===id});return a?a.name:'?'}).join(', ');
    var h='<div style="font-weight:700;margin-bottom:8px">Vista previa: <span style="color:var(--cyan)">'+tables.length+' mesas</span> en <span style="color:var(--blue)">'+aIds.length+' areas</span></div>';
    h+='<div style="font-size:.78rem;color:var(--text-muted);margin-bottom:8px"><i class="fas fa-map-pin"></i> '+areaNames+'</div>';
    h+='<div style="display:flex;gap:10px;margin-bottom:8px"><span style="color:var(--green)"><i class="fas fa-check-circle"></i> '+free.length+' libres (se eliminaran)</span><span style="color:var(--red)"><i class="fas fa-exclamation-circle"></i> '+busy.length+' ocupadas (se omitiran)</span></div>';
    if(tables.length>0){
        h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;max-height:150px;overflow-y:auto">';
        tables.forEach(function(t){
            var color=t.status==='libre'?'var(--green)':'var(--red)';
            h+='<span style="padding:2px 8px;border-radius:4px;font-size:.75rem;background:'+(t.status==='libre'?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)')+';color:'+color+';border:1px solid '+color+'">'+t.name+'</span>';
        });
        h+='</div>';
    }
    pre.innerHTML=h;
}
function deleteTablesByAreaConfirmed(){
    var aIds=getSelectedDeleteAreaIds();
    if(!aIds.length)return showToast('Seleccione al menos un area','warning');
    var areaNames=aIds.map(function(id){var a=DB.areas.find(function(x){return x.id===id});return a?a.name:'?'}).join(', ');
    var toDelete=DB.tables.filter(function(t){return aIds.indexOf(t.areaId)>=0&&t.status==='libre'});
    var skipped=DB.tables.filter(function(t){return aIds.indexOf(t.areaId)>=0&&t.status!=='libre'});
    if(!toDelete.length){showToast('No hay mesas libres para eliminar en las areas seleccionadas','warning');return}
    var count=toDelete.length;
    var idsToDelete=toDelete.map(function(t){return t.id});
    DB.tables=DB.tables.filter(function(t){return idsToDelete.indexOf(t.id)===-1});
    closeModal();
    showToast(count+' mesas eliminadas de '+areaNames+(skipped.length?' ('+skipped.length+' ocupadas no se eliminaron)':''),'warning');
    logAudit(currentUser.id,'Borrar mesas por area',areaNames+': '+count+' eliminadas'+(skipped.length?', '+skipped.length+' omitidas':''));
    renderAdminMesas();
}

function renderAdminMenu(){var comidas=DB.menu.filter(function(m){return requiresCocina(m.category)});var otras=DB.menu.filter(function(m){return!requiresCocina(m.category)});var rows=comidas.slice().sort(function(a,b){return a.name.localeCompare(b.name)}).map(function(m){var r=DB.recipes.find(function(x){return x.menuId===m.id});var hasRecipe=r&&r.ingredients.length>0;var badge=hasRecipe?'<span class="recipe-badge has"><i class="fas fa-check-circle"></i> '+r.ingredients.length+'</span>':'<span class="recipe-badge empty"><i class="fas fa-times-circle"></i> Sin receta</span>';var ls=m.stock<=3?' <span class="stock-alert">BAJO</span>':'';return'<tr style="border-bottom:1px solid var(--bg-hover)"><td style="padding:10px;font-weight:600">'+m.name+'</td><td style="padding:10px">S/ '+m.price.toFixed(2)+'</td><td style="padding:10px">'+m.stock+ls+'</td><td style="padding:10px">'+badge+'</td><td style="padding:10px;display:flex;gap:5px"><button class="btn btn-blue btn-xs" onclick="openRecipeEditor('+m.id+',\'admin\')"><i class="fas fa-book-open"></i> Receta</button><button class="btn btn-cyan btn-xs" onclick="editInventoryProduct('+m.id+')" title="Editar"><i class="fas fa-edit"></i></button><button class="btn btn-green btn-xs" onclick="openStockModal(\'menu\','+m.id+')"><i class="fas fa-plus"></i></button><button class="btn btn-red btn-xs" onclick="deleteMenuItemPw('+m.id+')"><i class="fas fa-trash"></i></button></td></tr>'});var otrosCount=otras.length;var infoBadge=otrosCount?'<div class="warning-box" style="margin-bottom:20px;background:rgba(6,182,212,.1);border-color:var(--cyan);color:var(--cyan)"><i class="fas fa-info-circle"></i> <strong>'+otrosCount+' productos sin preparacion</strong> (bebidas, golosinas, helados, chichas, postres) se gestionan en <strong>Inventario</strong></div>':'';document.getElementById('v-admin-menu').innerHTML=infoBadge+'<div class="card" style="margin-bottom:20px"><div class="card-header"><span class="card-title"><i class="fas fa-utensils" style="margin-right:6px;color:var(--green)"></i> Agregar Plato (Comida)</span><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-red btn-sm" onclick="resetAllMenuStock()"><i class="fas fa-undo"></i> Reset Stock</button></div></div><div class="form-row"><div class="form-group"><label>Nombre</label><input type="text" id="f-name" class="form-control"></div><div class="form-group"><label>Precio</label><input type="number" id="f-price" class="form-control" step="0.1"></div></div><div class="form-row"><div class="form-group"><label>Tiempo prep.</label><input type="number" id="f-time" class="form-control" value="1"></div><div class="form-group"><label>Stock</label><input type="number" id="f-stock" class="form-control" value="0"></div></div><div class="form-row"><div class="form-group"><label>Categoria</label><select id="f-cat" class="form-control"><option value="comida">Comida</option></select><small style="color:var(--text-muted);font-size:.7rem">Solo comida. Otros productos en Inventario</small></div><div class="form-group"></div></div><button class="btn btn-green" onclick="addMenu()"><i class="fas fa-plus"></i> Guardar Plato</button></div><table style="width:100%;border-collapse:collapse"><thead><tr style="text-align:left;color:var(--text-muted);border-bottom:1px solid var(--bg-hover)"><th style="padding:10px">Plato</th><th style="padding:10px">Precio</th><th style="padding:10px">Stock</th><th style="padding:10px">Receta</th><th style="padding:10px">Acciones</th></tr></thead><tbody>'+rows+'</tbody></table>'}
function addMenu(){var n=document.getElementById('f-name').value.trim(),p=parseFloat(document.getElementById('f-price').value),c=document.getElementById('f-cat')?document.getElementById('f-cat').value:'comida',t=parseInt(document.getElementById('f-time').value),s=parseInt(document.getElementById('f-stock').value);if(!n||!p)return showToast('Nombre y precio requeridos','warning');DB.menu.push({id:Date.now(),name:n,price:p,prepTime:t||1,stock:s||0,category:c});logAudit(currentUser.id,'Agregar plato',n+' S/'+p.toFixed(2));showToast('Plato agregado');renderAdminMenu()}
function deleteMenuItemPw(id){var dish=DB.menu.find(function(m){return m.id===id});actionWithPassword('Eliminar Producto','Se eliminara <b>'+dish.name+'</b> del menu y sus recetas asociadas.',function(){DB.menu=DB.menu.filter(function(m){return m.id!==id});DB.recipes=DB.recipes.filter(function(r){return r.menuId!==id});showToast(dish.name+' eliminado','warning');renderAdminMenu()})}

function openRecipeEditor(menuId,source){source=source||'cocina';var dish=DB.menu.find(function(m){return m.id===menuId});var recipe=DB.recipes.find(function(r){return r.menuId===menuId});var ings=recipe?JSON.parse(JSON.stringify(recipe.ingredients)):[];var hasRecipe=ings.length>0;var usedIds=ings.map(function(i){return i.inventoryId});var availInv=DB.inventory.filter(function(i){return usedIds.indexOf(i.id)===-1});var invOpts=availInv.map(function(i){return'<option value="'+i.id+'">'+i.name+' ('+i.unit+')</option>'}).join('');var h='<div class="modal-title"><i class="fas fa-'+(hasRecipe?'edit':'plus-circle')+'" style="color:var(--blue);margin-right:8px"></i> '+(hasRecipe?'Editar':'Nueva')+' Receta: <span style="color:var(--cyan)">'+dish.name+'</span></div><p style="color:var(--text-muted);font-size:.85rem;margin-bottom:18px">Cantidad exacta por plato.</p>';if(hasRecipe){h+='<div id="rec-editor-list">';ings.forEach(function(ing,idx){var inv=DB.inventory.find(function(i){return i.id===ing.inventoryId});if(!inv)return;h+='<div class="rec-ing-edit-row"><span class="ing-name">'+inv.name+'<span class="rec-ing-stock-tag '+(inv.stock<=inv.alertMin?'rec-ing-stock-low':'rec-ing-stock-ok')+'">'+inv.stock+' '+inv.unit+'</span></span><input type="number" class="form-control ing-qty-input" min="0.001" step="any" value="'+ing.qty+'" data-idx="'+idx+'"><span class="ing-unit">'+inv.unit+'</span><span style="font-size:.72rem;color:var(--text-muted)">/plato</span><button class="btn btn-red btn-xs" onclick="removeRecipeIngInline('+menuId+','+idx+',\''+source+'\')"><i class="fas fa-trash"></i></button></div>'});h+='</div>'}else{h+='<div id="rec-editor-list"><div style="text-align:center;padding:25px;color:var(--text-muted)"><i class="fas fa-clipboard-list" style="font-size:2rem;opacity:.2;display:block;margin-bottom:10px"></i><p>Sin insumos.</p></div></div>'}h+='<div class="rec-add-section"><div class="section-title"><i class="fas fa-plus-circle"></i> Agregar Insumo</div>';if(invOpts){h+='<div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap"><div style="flex:1;min-width:160px"><select id="rec-add-sel" class="form-control"><option value="">Seleccionar...</option>'+invOpts+'</select></div><div style="width:100px"><input type="number" id="rec-add-qty" class="form-control" min="0.001" step="any" value="100"></div><button class="btn btn-green" onclick="addRecipeIngInline('+menuId+',\''+source+'\')" style="padding:10px 16px"><i class="fas fa-plus"></i> Agregar</button></div>'}else{h+='<p style="color:var(--text-muted);font-size:.82rem">Todos los insumos ya estan en la receta.</p>'}h+='</div>';h+='<div style="display:flex;gap:10px;margin-top:20px"><button class="btn btn-green" style="flex:1;padding:14px" onclick="saveRecipeEdits('+menuId+',\''+source+'\')"><i class="fas fa-save" style="margin-right:6px"></i> Guardar</button>';if(hasRecipe)h+='<button class="btn btn-red" style="padding:14px 18px" onclick="deleteRecipeFull('+menuId+',\''+source+'\')"><i class="fas fa-trash"></i></button>';h+='<button class="btn" style="padding:14px 18px;background:var(--bg-hover);color:var(--text)" onclick="closeModal()">Cancelar</button></div>';openModal(h)}
function addRecipeIngInline(menuId,source){var invId=parseInt(document.getElementById('rec-add-sel').value);var qty=parseFloat(document.getElementById('rec-add-qty').value);if(!invId)return showToast('Seleccione insumo','warning');if(!qty||qty<=0)return showToast('Cantidad invalida','warning');var recipe=DB.recipes.find(function(r){return r.menuId===menuId});if(!recipe){recipe={menuId:menuId,ingredients:[]};DB.recipes.push(recipe)}if(recipe.ingredients.some(function(i){return i.inventoryId===invId}))return showToast('Ya esta en la receta','warning');recipe.ingredients.push({inventoryId:invId,qty:qty});showToast('Agregado');openRecipeEditor(menuId,source)}
function removeRecipeIngInline(menuId,idx,source){var recipe=DB.recipes.find(function(r){return r.menuId===menuId});if(!recipe)return;var inv=DB.inventory.find(function(i){return i.id===recipe.ingredients[idx].inventoryId});recipe.ingredients.splice(idx,1);if(!recipe.ingredients.length)DB.recipes=DB.recipes.filter(function(r){return r.menuId!==menuId});showToast((inv?inv.name:'Insumo')+' quitado','warning');openRecipeEditor(menuId,source)}
function saveRecipeEdits(menuId,source){var recipe=DB.recipes.find(function(r){return r.menuId===menuId});if(!recipe)return;var inputs=document.querySelectorAll('.ing-qty-input');var changed=0;inputs.forEach(function(inp){var idx=parseInt(inp.getAttribute('data-idx'));var nq=parseFloat(inp.value);if(nq&&nq>0&&recipe.ingredients[idx]&&nq!==recipe.ingredients[idx].qty){recipe.ingredients[idx].qty=nq;changed++}});showToast(changed>0?changed+' actualizada(s)':'Guardado','warning');closeModal();if(source==='admin')renderAdminMenu();else renderCocinaRecetas()}
function deleteRecipeFull(menuId,source){var dish=DB.menu.find(function(m){return m.id===menuId});DB.recipes=DB.recipes.filter(function(r){return r.menuId!==menuId});closeModal();showToast('Receta de '+dish.name+' eliminada','warning');if(source==='admin')renderAdminMenu();else renderCocinaRecetas()}

"100"></div></div><div class="form-row"><div class="form-group"><label>Unidad</label><select id="inv-unit" class="form-control"><option value="g">Gramos (g)</option><option value="kg">Kilogramos (kg)</option><option value="ml">Mililitros (ml)</option><option value="l">Litros (l)</option><option value="ud">Unidades (ud)</option></select></div><div class="form-group"><label>Alerta minima</label><input type="number" id="inv-alert" class="form-control" value="10"></div></div><button class="btn btn-blue" onclick="addInventory()"><i class="fas fa-plus"></i> Agregar</button></div><table style="width:100%;border-collapse:collapse"><thead><tr style="text-align:left;color:var(--text-muted);border-bottom:1px solid var(--bg-hover)"><th style="padding:10px">Insumo</th><th style="padding:10px">Stock</th><th style="padding:10px">Estado</th><th style="padding:10px">Acciones</th></tr></thead><tbody>'+rows+'</tbody></table>'
    }else{

        var items=DB.menu.filter(function(m){return m.category===catFilter});
        var formCard='<div class=card style=margin-bottom:20px><div class=card-header><span class=card-title><i class="fas '+catIcon+'" style=margin-right:6px;color:var(--cyan)></i> Agregar '+catLabel+'</span><button class="btn btn-red btn-xs" onclick="resetCategoryStock(\''+catFilter+'\')" title="Reset stock a 0"><i class="fas fa-undo"></i> Reset Stock</button></div><div class=form-row><div class=form-group><label>Nombre del Producto</label><input type=text id=invp-name class=form-control placeholder="Ej: Coca Cola 1L"></div><div class=form-group><label>Precio S/</label><input type=number id=invp-price class=form-control step=0.1 placeholder="0.00"></div></div><div class=form-row><div class=form-group><label>Cantidad Inicial</label><input type=number id=invp-stock class=form-control value=10 min=0></div><div class=form-group><label>Categoria</label><input type=text class=form-control value="'+getMenuCategoryName(catFilter)+'" readonly style=color:var(--cyan);font-weight:600></div></div><button class="btn btn-green" onclick=addInventoryProduct(\''+catFilter+'\')><i class="fas fa-plus"></i> Agregar '+catLabel+'</button></div>';
        var rowsB=items.slice().sort(function(a,b){return a.name.localeCompare(b.name)}).map(function(m){var low=m.stock<=2;var es=low?'<span class="stock-alert"><i class="fas fa-exclamation-triangle"></i> BAJO</span>':'<span style="color:var(--green);font-size:.8rem"><i class="fas fa-check"></i> OK</span>';return'<tr style="border-bottom:1px solid var(--bg-hover)"><td style="padding:10px;font-weight:600">'+m.name+'</td><td style="padding:10px">'+m.stock+' <span style="color:var(--cyan);font-weight:700;font-size:.8rem">ud</span></td><td style="padding:10px">'+es+'</td><td style="padding:10px">S/ '+m.price.toFixed(2)+'</td><td style="padding:10px;display:flex;gap:5px"><button class="btn btn-blue btn-xs" onclick="editInventoryProduct('+m.id+')" title="Editar"><i class="fas fa-edit"></i></button><button class="btn btn-red btn-xs" onclick="deleteInventoryProduct('+m.id+')" title="Eliminar"><i class="fas fa-trash"></i></button><button class="btn btn-green btn-xs" onclick="openStockModal(\'menu\','+m.id+')" title="Agregar stock"><i class="fas fa-plus"></i></button></td></tr>'}).join('');

function addInventory(){var n=document.getElementById('inv-name').value.trim(),s=parseInt(document.getElementById('inv-stock').value)||0,u=document.getElementById('inv-unit').value,a=parseInt(document.getElementById('inv-alert').value)||5;if(!n)return;DB.inventory.push({id:Date.now(),name:n,stock:s,unit:u,alertMin:a});showToast('Agregado');renderAdminInventario()}
function deleteInvItem(id){DB.inventory=DB.inventory.filter(function(m){return m.id!==id});showToast('Eliminado');renderAdminInventario()}
function openStockModal(type,id){var item=type==='menu'?DB.menu.find(function(m){return m.id===id}):DB.inventory.find(function(m){return m.id===id});var un=type==='inv'?' '+item.unit:'';openModal('<div class="modal-title">Reponer: '+item.name+'</div><p style="margin-bottom:15px;color:var(--text-muted)">Actual: <b>'+item.stock+un+'</b></p><div class="form-group"><label>Cantidad a SUMAR</label><input type="number" id="replenish-qty" class="form-control" min="1" value="10"></div><button class="btn btn-green" style="width:100%" onclick="confirmReplenish(\''+type+'\','+id+')">Confirmar</button>')}
function confirmReplenish(type,id){var qty=parseInt(document.getElementById('replenish-qty').value);if(!qty)return;var item=type==='menu'?DB.menu.find(function(m){return m.id===id}):DB.inventory.find(function(m){return m.id===id});item.stock+=qty;closeModal();showToast('+'+qty+(type==='inv'?' '+item.unit:'')+' -> Total: '+item.stock+(type==='inv'?' '+item.unit:''));if(type==='menu')renderAdminMenu();else renderAdminInventario()}
function openReduceStockModal(type,id){
    var item=type==='menu'?DB.menu.find(function(m){return m.id===id}):DB.inventory.find(function(m){return m.id===id});
    if(!item)return;
    var un=type==='inv'?' '+item.unit:'';
    actionWithPassword('Reducir Stock','Se descontara stock de <b>'+item.name+'</b>. Actual: <b>'+item.stock+un+'</b>',function(){
        openModal('<div class="modal-title" style="color:var(--amber)"><i class="fas fa-minus-circle" style="margin-right:8px"></i> Reducir Stock: '+item.name+'</div><p style="margin-bottom:15px;color:var(--text-muted)">Actual: <b>'+item.stock+un+'</b></p><div class="form-group"><label>Cantidad a RESTAR</label><input type="number" id="reduce-stock-qty" class="form-control" min="1" max="'+item.stock+'" value="1"></div><div style="display:flex;gap:10px"><button class="btn btn-amber" style="flex:1;padding:14px" onclick="confirmReduceStock(\''+type+'\','+id+')"><i class="fas fa-check"></i> Confirmar</button><button class="btn" style="padding:14px 18px;background:var(--bg-hover);color:var(--text)" onclick="closeModal()">Cancelar</button></div>');
        setTimeout(function(){var i=document.getElementById('reduce-stock-qty');if(i){i.focus();i.select()}},100);
    });
}
function confirmReduceStock(type,id){
    var qty=parseInt(document.getElementById('reduce-stock-qty').value);
    if(!qty||qty<1)return showToast('Cantidad invalida','warning');
    var item=type==='menu'?DB.menu.find(function(m){return m.id===id}):DB.inventory.find(function(m){return m.id===id});
    if(!item)return;
    if(qty>item.stock){showToast('Stock insuficiente. Actual: '+item.stock+(type==='inv'?' '+item.unit:''),'error');return}
    item.stock-=qty;
    closeModal();
    showToast('-'+qty+(type==='inv'?' '+item.unit:'')+' -> Total: '+item.stock+(type==='inv'?' '+item.unit:''),'warning');
    logAudit(currentUser.id,'Reducir stock',item.name+': -'+qty+(type==='inv'?' '+item.unit:'')+' (quedan '+item.stock+')');
    if(type==='menu')renderAdminMenu();else renderAdminInventario();
}
function addInventoryProduct(cat){
    var name=document.getElementById('invp-name').value.trim();
    var price=parseFloat(document.getElementById('invp-price').value);
    var stock=parseInt(document.getElementById('invp-stock').value)||0;
    if(!name)return showToast('Ingrese nombre del producto','warning');
    if(!price||price<=0)return showToast('Ingrese precio valido','warning');
    var maxId=0;DB.menu.forEach(function(m){if(m.id>maxId)maxId=m.id});
    DB.menu.push({id:maxId+1,name:name,price:price,prepTime:1,stock:stock,category:cat});
    showToast(cat+' agregado: '+name+' (S/ '+price.toFixed(2)+', stock: '+stock+')');
    renderAdminInventario();
}
function resetAllStock(){
    var count=DB.inventory.length;
    if(!count)return showToast('No hay insumos','warning');
    actionWithPassword('Resetear Stock a Cero','Se pondra STOCK 0 a TODOS los <b>'+count+' insumos</b> de inventario. Accion irreversible.',function(){
        DB.inventory.forEach(function(i){i.stock=0});
        showToast('Stock de '+count+' insumos reseteados a 0','warning');
        logAudit(currentUser.id,'Reset stock inventario','Todos los insumos ('+count+') -> 0');
        renderAdminInventario();
    });
}
function resetAllMenuStock(){
    var count=DB.menu.length;
    if(!count)return showToast('No hay productos en el menu','warning');
    actionWithPassword('Resetear Stock Menu','Se pondra STOCK 0 a TODOS los <b>'+count+' productos</b> del menu. Accion irreversible.',function(){
        DB.menu.forEach(function(m){m.stock=0});
        showToast('Stock de '+count+' productos del menu reseteados a 0','warning');
        logAudit(currentUser.id,'Reset stock menu','Todos los productos del menu ('+count+') -> 0');
        renderAdminMenu();
    });
}
function resetCategoryStock(cat){
    var items=DB.menu.filter(function(m){return m.category===cat});
    var count=items.length;
    if(!count)return showToast('No hay productos en esta categoria','warning');
    var catName=getMenuCategoryName(cat);
    actionWithPassword('Resetear Stock: '+catName,'Se pondra STOCK 0 a TODOS los <b>'+count+' productos</b> de '+catName+'. Accion irreversible.',function(){
        items.forEach(function(m){m.stock=0});
        showToast('Stock de '+count+' productos reseteados a 0 en '+catName,'warning');
        logAudit(currentUser.id,'Reset stock categoria',catName+': '+count+' productos -> 0');
        renderAdminInventario();
    });
}
function editInventoryProduct(id){
    var m=DB.menu.find(function(x){return x.id===id});

function updateResTypeDesc(t){
var m={simple:'Reserva estandar para una ocasion normal',cumpleaños:'Celebracion de cumpleanos. Incluye decoracion especial',evento:'Evento social o reunion especial',corporativo:'Reserva para empresas y reuniones de trabajo',vip:'Experiencia premium con atencion prioritaria',masiva:'Reserva de multiples mesas para grupos grandes',escolar:'Paquete especial para instituciones educativas'};

function toggleResTableSelect(el){el.classList.toggle('selected')}
function getSelectedTables(){return Array.from(document.querySelectorAll('.res-table-option.selected')).map(function(el){return parseInt(el.getAttribute('data-table-id'))})}

function saveReservation(){
var name=document.getElementById('res-name').value.trim();
if(!name)return showToast('Ingrese nombre del cliente','warning');
var dni=document.getElementById('res-dni').value.trim();
var phone=document.getElementById('res-phone').value.trim();
var email=document.getElementById('res-email').value.trim();
var date=document.getElementById('res-date').value;
var time=document.getElementById('res-time').value;
var persons=parseInt(document.getElementById('res-persons').value)||1;
var type=document.getElementById('res-type-select').value;
var notes=document.getElementById('res-notes').value.trim();
if(!date||!time)return showToast('Fecha y hora requeridas','warning');
if(persons<1)return showToast('Cantidad de personas invalida','warning');
var selectedTableIds=getSelectedTables();
if(!selectedTableIds.length)return showToast('Seleccione al menos una mesa','warning');

// Validar capacidad total
var totalCap=0;selectedTableIds.forEach(function(id){var t=DB.tables.find(function(x){return x.id===id});if(t)totalCap+=t.capacity});
if(persons>totalCap)return showToast('La capacidad total ('+totalCap+' pers.) es menor a '+persons+' personas. Seleccione mas mesas.','warning');

// Obtener nombres de mesas
var tableNames=[],tableIds=[];
selectedTableIds.forEach(function(id){
var t=DB.tables.find(function(x){return x.id===id});
if(t){tableNames.push(t.name);tableIds.push(id);t.status='reservada'}
});

DB.reservations.push({
id:DB.counters.reservation++,
customerName:name,
dni:dni,
phone:phone||'',
email:email,
date:new Date(date+'T'+time).getTime(),
time:time,
persons:persons,
tableIds:tableIds,
tableNames:tableNames,
status:'pendiente',
type:type,
notes:notes,
observaciones:'',
createdAt:Date.now()
});
logAudit(currentUser.id,'Nueva reserva',name+' - '+tableNames.join(', ')+' - '+date+' '+time);
closeModal();
showToast('Reserva creada exitosamente para '+name);
renderAdminReservas();
}

function confirmReservation(id){
var r=DB.reservations.find(function(x){return x.id===id});
if(!r)return;
r.status='confirmada';
if(r.tableIds&&r.tableIds.length){r.tableIds.forEach(function(tid){var t=DB.tables.find(function(x){return x.id===tid});if(t)t.status='reservada'})}
showToast('Reserva confirmada para '+r.customerName);
renderAdminReservas();
}

function cancelReservation(id){
var r=DB.reservations.find(function(x){return x.id===id});
if(!r)return;
r.status='cancelada';
if(r.tableIds&&r.tableIds.length){r.tableIds.forEach(function(tid){var t=DB.tables.find(function(x){return x.id===tid});if(t&&t.status==='reservada'&&t.orderId===null)t.status='libre'})}
showToast('Reserva cancelada','warning');
renderAdminReservas();
}

function releaseExpiredReservations(){
var now=Date.now();
var threshold=now-2*3600000; // 2 horas sin confirmar
DB.reservations.forEach(function(r){
if(r.status==='pendiente'&&r.date<threshold){
r.status='cancelada';
if(r.tableIds&&r.tableIds.length){r.tableIds.forEach(function(tid){var t=DB.tables.find(function(x){return x.id===tid});if(t&&t.status==='reservada'&&t.orderId===null)t.status='libre'})}
}
});
// Liberar mesas de reservas completadas
DB.reservations.forEach(function(r){
if(r.status==='completada'&&r.tableIds&&r.tableIds.length){r.tableIds.forEach(function(tid){var t=DB.tables.find(function(x){return x.id===tid});if(t&&t.status==='reservada'&&t.orderId===null)t.status='libre'})}
});
}

function savePrinter(id){
var name=document.getElementById('pr-name').value.trim();
if(!name)return showToast('Ingrese nombre de la impresora','warning');
var modelSelect=document.getElementById('pr-model');
var modelOther=document.getElementById('pr-model-t');
var model=modelSelect.value==='Otra'?modelOther.value.trim()||'Generica':modelSelect.value;
var type=document.getElementById('pr-type').value;
var itf=document.getElementById('pr-interface').value;
var area=document.getElementById('pr-area').value;
var paper=document.getElementById('pr-paper').value;
var copies=parseInt(document.getElementById('pr-copies').value)||1;
var ip=document.getElementById('pr-ip').value.trim();
var port=parseInt(document.getElementById('pr-port').value)||9100;
var active=document.getElementById('pr-active').value==='1';
var autoPrint=document.getElementById('pr-autoprint').checked;
var obj={name:name,model:model,type:type,interface:itf,area:area,paperSize:paper,copies:copies,ip:ip,port:port,active:active,autoPrint:autoPrint};
if(id===null||id==='null'){
obj.id=DB.counters.printer++;
obj.createdAt=Date.now();
DB.printers.push(obj);
showToast('Impresora agregada: '+name);
}else{
var existing=DB.printers.find(function(x){return x.id===parseInt(id)});
if(!existing)return showToast('Impresora no encontrada','error');
obj.id=existing.id;obj.createdAt=existing.createdAt;
Object.assign(existing,obj);
showToast('Impresora actualizada: '+name);
}
closeModal();renderAdminImpresoras();
}
function togglePrinter(id){
var p=DB.printers.find(function(x){return x.id===id});
if(!p)return;
p.active=!p.active;
showToast(p.name+(p.active?' activada':' desactivada'));
renderAdminImpresoras();
}
function deletePrinter(id){
var p=DB.printers.find(function(x){return x.id===id});
if(!p)return;
actionWithPassword('Eliminar Impresora','Se eliminara permanentemente: <b>'+p.name+'</b>',function(){
DB.printers=DB.printers.filter(function(x){return x.id!==id});
showToast('Impresora eliminada');

function autoPrint(area,title,content){
var printers=getPrinterForArea(area);
printers.forEach(function(p){

for(var i=1;i<p.copies;i++)finalContent+='\n\n'+content;
DB.printJobs.push({id:DB.counters.printJob++,title:title,area:area,status:'pendiente',createdAt:Date.now(),content:finalContent,printerId:p.id});
});
if(printers.length){showToast('Imprimiendo en '+area+' ('+printers.length+' impresora'+(printers.length>1?'s':'')+')')}
}
function autoPrintComanda(table,items,mozoName,comandaNum,observaciones){
var kitchenItems=items.filter(function(i){return requiresCocina(i.category)});
var barItems=items.filter(function(i){return i.category==='bebidas'||i.category==='chicha'});
var heladoItems=items.filter(function(i){return i.category==='helados'||i.category==='postres'});

if(barItems.length){

autoPrint('bar','Bar #'+comandaNum+' - '+table.name,content);
}
if(heladoItems.length){
var content=buildComandaContent(heladoItems,table,mozoName,comandaNum,'');
autoPrint('helados','Helados #'+comandaNum+' - '+table.name,content);
}
if(golosinasItems.length){
// Golosinas van directo al ticket, no a comanda
}
}
function autoPrintReceipt(table,items,total,paymentMethod){

/* ===== KITCHEN SOUND HELPERS ===== */
function testKitchenSound(idx){
    if(idx===-1){playKitchenAlert();return}
    var sounds=DB.sysconfig.kitchenSounds.customSounds;
    if(!sounds||!sounds[idx]){showToast('No hay sonido','warning');return}
    try{
        var audio=new Audio(sounds[idx]);
        audio.volume=DB.sysconfig.kitchenSounds.volume||0.7;
        audio.play().catch(function(e){showToast('Error al reproducir','error')});
    }catch(e){showToast('Error al reproducir','error')}
}
function addKitchenSound(input){
    if(!input||!input.files||!input.files[0])return;
    var file=input.files[0];
    if(file.size>5*1024*1024){showToast('Maximo 5MB','warning');return}
    var reader=new FileReader();
    reader.onload=function(e){
        var dataUrl=e.target.result;
        DB.sysconfig.kitchenSounds.customSounds.push(dataUrl);
        showToast('Sonido agregado');
        input.value='';
        renderAdminSistema();
    };
    reader.readAsDataURL(file);
}
function removeKitchenSound(idx){
    var sounds=DB.sysconfig.kitchenSounds.customSounds;
    if(!sounds||!sounds[idx])return;
    sounds.splice(idx,1);
    showToast('Sonido eliminado');
    renderAdminSistema();
}

function exportBackup(){
var backup={
version:'Villa Moche ERP v3.0',
exportedAt:new Date().toISOString(),
exportedBy:currentUser?currentUser.name:'unknown',
data:{
sysconfig:DB.sysconfig,
areas:DB.areas,
tables:DB.tables,
menu:DB.menu,
inventory:DB.inventory,
recipes:DB.recipes,
customers:DB.customers,
salesHistory:DB.salesHistory,
orders:DB.orders,
reservations:DB.reservations,
promotions:DB.promotions,
deliveries:DB.deliveries,
auditLogs:DB.auditLogs,
cashClosures:DB.cashClosures,
printers:DB.printers,
printJobs:DB.printJobs,
users:DB.users,
cashDesks:DB.cashDesks,
counters:DB.counters
}
};
var json=JSON.stringify(backup,null,2);
var blob=new Blob([json],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;
a.download='villa-moche-backup-'+new Date().toISOString().slice(0,10)+'.json';
a.click();
URL.revokeObjectURL(url);
showToast('Backup descargado exitosamente');
logAudit(currentUser?currentUser.id:0,'Backup exportado','Backup manual generado por '+(currentUser?currentUser.name:'N/A'));
}
